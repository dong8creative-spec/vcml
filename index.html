<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCML | 시작</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reelboard-fonts.css" />
    <style>
        :root {
            --brand-blue: #10069F;
            --brand-blue-hover: #000080;
            --brand-light: #F0F2FF;
            --text-main: #10069F;
            --text-sub: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', 'IBM Plex Sans KR', sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #f8f9ff 0%, #eef0ff 45%, #ffffff 100%);
            color: var(--text-main);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .portal-header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 520px;
        }
        .portal-header h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }
        .portal-header p {
            font-size: 0.98rem;
            color: var(--text-sub);
            line-height: 1.6;
        }
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 880px;
        }
        .portal-card {
            display: block;
            padding: 36px 28px;
            border-radius: 28px;
            background: #fff;
            border: 1px solid rgba(16, 6, 159, 0.08);
            box-shadow: 0 16px 48px rgba(16, 6, 159, 0.08);
            text-decoration: none;
            color: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
            position: relative;
            overflow: hidden;
        }
        .portal-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(16, 6, 159, 0.04), transparent 55%);
            pointer-events: none;
        }
        .portal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 56px rgba(16, 6, 159, 0.12);
            border-color: rgba(16, 6, 159, 0.15);
        }
        .portal-card h2 {
            font-size: 1.35rem;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
        }
        .portal-card p {
            font-size: 0.92rem;
            color: var(--text-sub);
            line-height: 1.55;
            position: relative;
        }
        .portal-card .portal-cta {
            margin-top: 20px;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--brand-blue);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .portal-card .portal-cta span { transition: transform 0.2s; }
        .portal-card:hover .portal-cta span { transform: translateX(4px); }
        .portal-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--brand-blue);
            background: var(--brand-light);
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 12px;
            position: relative;
        }
        .portal-foot {
            margin-top: 48px;
            font-size: 0.82rem;
            color: #888;
            text-align: center;
        }
        .portal-foot a { color: var(--brand-blue); font-weight: 600; }
        .portal-card h2.reel-board-name {
            font-size: 1.7rem;
        }
    </style>
</head>
<body>
    <div class="portal-header">
        <h1>VCML</h1>
        <p>이동할 화면을 선택해 주세요.</p>
    </div>
    <div class="portal-grid">
        <a href="main-site.html" class="portal-card">
            <span class="portal-badge">소개 · 신청 · 문의</span>
            <h2>VCML 사이트</h2>
            <p>과정 안내, 과정진단, 수강신청, 편집문의 등 기존 메인 콘텐츠로 이동합니다.</p>
            <div class="portal-cta">열기 <span>→</span></div>
        </a>
        <a href="moodboard.html" class="portal-card">
            <span class="portal-badge">릴스 · 쇼츠 모아보기</span>
            <h2 class="reel-board-name">reel board</h2>
            <p>인스타그램 릴스와 유튜브 쇼츠만 모아 두는 보드입니다. Google 로그인 후 등록할 수 있습니다.</p>
            <div class="portal-cta">열기 <span>→</span></div>
        </a>
    </div>
    <p class="portal-foot">자막 도구는 <a href="main-site.html#top">VCML 사이트</a> 상단 메타/링크를 통해 이용할 수 있습니다.</p>
</body>
</html>
