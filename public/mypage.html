<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.addEventListener('load', () => {
      const run = () => {
        const s = document.createElement('script')
        s.async = true
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-13X3J2EYQ2'
        document.head.appendChild(s)
        gtag('js', new Date())
        gtag('config', 'G-13X3J2EYQ2')
      }
      if ('requestIdleCallback' in window) requestIdleCallback(run, { timeout: 2000 })
      else setTimeout(run, 1200)
    })
  </script>
  <title>마이페이지 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=14" />
  <link rel="stylesheet" href="/css/common.css?v=3" />
  <link rel="stylesheet" href="/css/mypage.css?v=9" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />

</head>
<body>
<div data-site-header></div>

<div class="mypage-wrap">
  <aside class="my-sidebar">
    <div id="my-profile"></div>
    <div class="my-sidebar-menus">
      <nav class="my-nav-panel" id="my-nav" aria-label="마이페이지 메뉴"></nav>
      <div class="my-nav-logout-panel" id="my-nav-logout"></div>
    </div>
  </aside>
  <main class="my-main" id="my-main">
    <!-- 내 강의 -->
    <div class="my-section" id="sec-courses">
      <div class="section-title">내 강의</div>
      <div id="my-courses"><div class="spinner"></div></div>
    </div>
    <!-- 내 클라이언츠 (의뢰인) -->
    <div class="my-section" id="sec-projects">
      <div class="section-title">내 클라이언츠</div>
      <div id="my-projects"><div class="spinner"></div></div>
    </div>
    <!-- 내 견적 (편집자) -->
    <div class="my-section" id="sec-quotes">
      <div class="section-title">내 견적 현황</div>
      <div id="my-quotes"><div class="spinner"></div></div>
    </div>
    <!-- 에디터즈 프로필 -->
    <div class="my-section" id="sec-editor-profile">
      <div class="section-title">에디터즈 프로필</div>
      <div id="editor-profile-wrap"><div class="spinner"></div></div>
    </div>
    <!-- 내 쿠폰 -->
    <div class="my-section" id="sec-coupons">
      <div class="section-title">내 쿠폰</div>
      <div id="my-coupons"><div class="spinner"></div></div>
    </div>
    <!-- 프로필 · 설정 -->
    <div class="my-section" id="sec-settings">
      <div class="section-title">프로필 · 설정</div>

      <div class="profile-form-card">
        <div class="profile-photo-row">
          <div class="profile-photo-preview" id="profile-photo-preview">?</div>
          <div class="profile-photo-actions">
            <label><i class="ti ti-camera"></i> 사진 변경<input type="file" id="profile-photo-input" accept="image/jpeg,image/png,image/webp" /></label>
            <button type="button" class="btn-photo-remove" id="btn-photo-remove" style="display:none" onclick="removeProfilePhoto()">사진 삭제</button>
            <span style="font-size:12px;color:#bbb;line-height:1.5">JPG·PNG·WEBP, 최대 2MB</span>
          </div>
        </div>

        <div class="pf-field">
          <label>이름</label>
          <input type="text" id="pf-name" maxlength="30" placeholder="표시 이름" />
        </div>

        <div class="pf-field">
          <label>휴대폰 번호 <span class="pf-hint">라이브·알림톡 수신용</span></label>
          <input type="tel" id="pf-phone" maxlength="13" placeholder="010-0000-0000" oninput="formatPhoneInput(this)" />
        </div>

        <div class="pf-field">
          <label>자기소개 <span class="pf-hint">공개 프로필에 표시됩니다</span></label>
          <textarea id="pf-bio" maxlength="500" placeholder="간단한 자기소개를 작성해주세요. (에디터즈·클라이언츠 매칭 시 도움이 됩니다)"></textarea>
          <div class="pf-char-count"><span id="pf-bio-count">0</span>/500</div>
        </div>

        <div class="pf-field">
          <label>SNS · 개인 링크 <span class="pf-hint">최대 5개</span></label>
          <div class="link-list" id="link-list"></div>
          <button type="button" class="btn-add-link" id="btn-add-link" onclick="addLinkRow()"><i class="ti ti-plus"></i> 링크 추가</button>
        </div>

        <button type="button" class="btn-save-profile" id="btn-save-profile" onclick="saveProfile()">프로필 저장</button>
      </div>

      <div class="settings-card">
        <div class="settings-row">
          <div>
            <div class="settings-label">마케팅 정보 수신 동의</div>
            <div class="settings-desc">신규 강의 오픈, 이벤트, 할인 정보를 이메일 또는 등록하신 연락처(알림톡·문자)로 받습니다.</div>
          </div>
          <div>
            <span id="marketing-status" style="font-size: 15.6px;color:#aaa"></span>
            <button id="btn-marketing-toggle" class="btn-settings-action" onclick="withdrawMarketing()">마케팅 수신 철회</button>
          </div>
        </div>
        <div style="font-size: 14.4px;color:#bbb;margin-top:12px;line-height:1.6">
          동의 철회 시 마케팅 수신(이메일·문자·알림톡)이 즉시 중단됩니다. 동의 기록은 법적 근거로 보관됩니다.
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-label" style="margin-bottom:4px">연결된 계정</div>
        <div class="settings-desc" style="margin-bottom:14px">소셜 계정을 연결하면 다음부터 해당 계정으로도 로그인할 수 있습니다.</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">Google</div>
            <div class="settings-desc" id="google-link-status">확인 중…</div>
          </div>
          <button id="btn-google-link-toggle" class="btn-settings-action" onclick="toggleSocialLink('google')">연결하기</button>
        </div>
        <div class="settings-row" style="margin-top:12px">
          <div>
            <div class="settings-label">카카오</div>
            <div class="settings-desc" id="kakao-link-status">확인 중…</div>
          </div>
          <button id="btn-kakao-link-toggle" class="btn-settings-action" onclick="toggleSocialLink('kakao')">연결하기</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js?v=3"></script>
<script src="/js/live-reminder.js?v=24"></script>
<script src="/js/site-layout.js"></script>
<script src="/js/site-header.js?v=10"></script>
<script>
if (!API.isLoggedIn()) { location.href = '/login.html?next=/mypage.html' }
const user = API.user()

const statusLabel = { open:'모집중', matched:'매칭완료', contract:'계약완료', in_progress:'작업중', delivered:'납품완료', completed:'완료', cancelled:'취소' }
const memberTypeLabel = { student:'수강생', client:'의뢰인' }
const roleLabel = { editor:'에디터즈', admin:'관리자' }
const memberType = user.member_type || 'student'

const LINK_PRESETS = ['Instagram', 'YouTube', 'Website', 'Blog', 'Behance', '기타']

let profileData = null
let profilePromise = null
let myCoursesPromise = null
window.__myCoursesPromise = null
let pendingProfileImage = undefined

function getProfileData({ refresh = false } = {}) {
  if (!refresh && profileData) return Promise.resolve(profileData)
  if (!refresh && profilePromise) return profilePromise
  profilePromise = API.get('/my/profile').then(p => {
    profileData = p
    const stored = { ...API.user(), ...userPayloadFromProfile(p), phone: p.phone }
    localStorage.setItem('tc_user', JSON.stringify(stored))
    return p
  }).finally(() => { profilePromise = null })
  return profilePromise
}

function getMyCourses({ refresh = false } = {}) {
  if (!refresh && myCoursesPromise) return myCoursesPromise
  myCoursesPromise = API.get('/my/courses')
  window.__myCoursesPromise = myCoursesPromise
  return myCoursesPromise
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function formatAccessUntil(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  if (Number.isNaN(d.getTime())) return ''
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`
}

function avatarHtml(profile) {
  const name = profile?.name || user?.name || '?'
  if (profile?.profile_image) {
    return `<div class="my-avatar has-photo"><img src="${profile.profile_image.replace(/"/g, '&quot;')}" alt="" /></div>`
  }
  return `<div class="my-avatar">${name[0] || '?'}</div>`
}

function renderSidebar(profile) {
  const p = profile || profileData || user
  const mt = p.member_type || 'student'
  const roleBadges = `<div class="my-role-badges">${
    p.role === 'admin'
      ? `<span class="my-role admin">${roleLabel.admin}</span>`
      : `${p.role === 'editor' ? `<span class="my-role editor">${roleLabel.editor}</span>` : ''}<span class="my-role ${mt}">${memberTypeLabel[mt] || '수강생'}</span>`
  }</div>`
  const bioBlock = p.bio ? `<div class="my-bio-preview">${escapeHtml(p.bio)}</div>` : ''
  document.getElementById('my-profile').innerHTML = `
    ${avatarHtml(p)}
    <div class="my-name">${escapeHtml(p.name || '')}</div>
    <div class="my-email">${escapeHtml(p.email || '')}</div>
    ${bioBlock}
    ${roleBadges}`
}

renderSidebar(user)

const tabs = [
  { id:'courses',  icon:'ti-book',         label:'내 강의',       always:true },
  { id:'projects', icon:'ti-clipboard',    label:'내 클라이언츠', memberTypes:['client'], roles:['admin'] },
  { id:'quotes',   icon:'ti-file-invoice', label:'내 견적',       roles:['editor','admin'] },
  { id:'editor-profile', icon:'ti-rosette', label:'에디터즈 프로필', roles:['editor','admin'] },
  { id:'coupons',  icon:'ti-ticket',       label:'내 쿠폰',       always:true },
  { id:'settings', icon:'ti-user-circle',  label:'프로필 · 설정', always:true },
]

const visibleTabs = tabs.filter(t => {
  if (t.always) return true
  if (t.memberTypes && t.memberTypes.includes(memberType)) return true
  if (t.roles && t.roles.includes(user.role)) return true
  return false
})

document.getElementById('my-nav').innerHTML = visibleTabs.map(t => `
  <a class="my-nav-item" data-sec="${t.id}" href="#" onclick="showSection('${t.id}');return false">
    <i class="ti ${t.icon}"></i><span>${t.label}</span>
  </a>`).join('')

document.getElementById('my-nav-logout').innerHTML = `
  <a class="my-nav-item my-nav-item--logout" href="#" onclick="API.logout();return false">
    <i class="ti ti-logout"></i><span>로그아웃</span>
  </a>`

let currentSection = ''
function showSection(id) {
  document.querySelectorAll('.my-section').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.my-nav-item[data-sec]').forEach(el => el.classList.remove('active'))
  const sec = document.getElementById('sec-' + id)
  if (sec) sec.classList.add('active')
  const navItem = document.querySelector(`.my-nav-item[data-sec="${id}"]`)
  if (navItem) navItem.classList.add('active')
  currentSection = id
  if (id === 'courses') loadCourses()
  if (id === 'projects') loadProjects()
  if (id === 'quotes') loadQuotes()
  if (id === 'editor-profile') loadEditorProfile()
  if (id === 'coupons') loadCoupons()
  if (id === 'settings') loadSettings()
}

function updatePhotoPreview(src, initial) {
  const el = document.getElementById('profile-photo-preview')
  const rm = document.getElementById('btn-photo-remove')
  if (src) {
    el.innerHTML = `<img src="${src.replace(/"/g, '&quot;')}" alt="" />`
    if (rm) rm.style.display = 'block'
  } else {
    el.textContent = initial || '?'
    if (rm) rm.style.display = 'none'
  }
}

function addLinkRow(label = 'Instagram', url = '') {
  const list = document.getElementById('link-list')
  const rows = list.querySelectorAll('.link-row')
  if (rows.length >= 5) { toast('링크는 최대 5개까지 등록할 수 있습니다.', 'info'); return }
  const opts = LINK_PRESETS.map(p => `<option value="${p}" ${p === label ? 'selected' : ''}>${p}</option>`).join('')
  const row = document.createElement('div')
  row.className = 'link-row'
  row.innerHTML = `
    <select class="link-label">${opts}</select>
    <input type="url" class="link-url" placeholder="https://..." value="${escapeHtml(url)}" />
    <button type="button" class="btn-link-remove" onclick="this.closest('.link-row').remove();updateAddLinkBtn()" title="삭제">×</button>`
  list.appendChild(row)
  updateAddLinkBtn()
}

function updateAddLinkBtn() {
  const btn = document.getElementById('btn-add-link')
  const n = document.querySelectorAll('#link-list .link-row').length
  if (btn) btn.style.display = n >= 5 ? 'none' : 'inline-flex'
}

function collectLinks() {
  return [...document.querySelectorAll('#link-list .link-row')].map(row => ({
    label: row.querySelector('.link-label')?.value || '기타',
    url: row.querySelector('.link-url')?.value.trim() || '',
  })).filter(l => l.url)
}

function resizeProfileImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = () => {
      const img = new Image()
      img.onload = () => {
        const max = 256
        let w = img.width, h = img.height
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max }
          else { w = Math.round(w * max / h); h = max }
        }
        const canvas = document.createElement('canvas')
        canvas.width = w; canvas.height = h
        canvas.getContext('2d').drawImage(img, 0, 0, w, h)
        resolve(canvas.toDataURL('image/jpeg', 0.85))
      }
      img.onerror = () => reject(new Error('이미지를 불러올 수 없습니다.'))
      img.src = reader.result
    }
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'))
    reader.readAsDataURL(file)
  })
}

document.getElementById('profile-photo-input')?.addEventListener('change', async e => {
  const file = e.target.files?.[0]
  if (!file) return
  if (file.size > 2 * 1024 * 1024) { toast('2MB 이하 이미지만 업로드할 수 있습니다.', 'error'); e.target.value = ''; return }
  try {
    pendingProfileImage = await resizeProfileImage(file)
    updatePhotoPreview(pendingProfileImage, document.getElementById('pf-name')?.value?.[0])
  } catch (err) {
    toast(err.message, 'error')
  }
  e.target.value = ''
})

function removeProfilePhoto() {
  pendingProfileImage = null
  updatePhotoPreview(null, document.getElementById('pf-name')?.value?.[0] || user.name?.[0])
}

document.getElementById('pf-bio')?.addEventListener('input', e => {
  document.getElementById('pf-bio-count').textContent = e.target.value.length
})

async function loadSettings() {
  try {
    profileData = await getProfileData()
    pendingProfileImage = undefined
    document.getElementById('pf-name').value = profileData.name || ''
    document.getElementById('pf-phone').value = profileData.phone || ''
    document.getElementById('pf-bio').value = profileData.bio || ''
    document.getElementById('pf-bio-count').textContent = (profileData.bio || '').length
    updatePhotoPreview(profileData.profile_image, profileData.name?.[0])
    const list = document.getElementById('link-list')
    list.innerHTML = ''
    const links = profileData.social_links?.length ? profileData.social_links : []
    if (links.length) links.forEach(l => addLinkRow(l.label, l.url))
    else addLinkRow()
    updateAddLinkBtn()
    const ms = document.getElementById('marketing-status')
    const mb = document.getElementById('btn-marketing-toggle')
    if (profileData.marketing_agreed) {
      ms.textContent = '동의함 ✅'; mb.style.display = 'inline-block'
    } else {
      ms.textContent = '미동의'; mb.style.display = 'none'
    }
    renderLinkStatus(profileData)
    renderSidebar(profileData)
  } catch (e) {
    toast('프로필을 불러오지 못했습니다.', 'error')
  }
}

function renderLinkStatus(p) {
  const map = [
    ['google', p.google_linked, 'google-link-status', 'btn-google-link-toggle'],
    ['kakao', p.kakao_linked, 'kakao-link-status', 'btn-kakao-link-toggle'],
  ]
  map.forEach(([provider, linked, statusId, btnId]) => {
    const statusEl = document.getElementById(statusId)
    const btn = document.getElementById(btnId)
    if (!statusEl || !btn) return
    if (linked) {
      statusEl.textContent = '연결됨 ✅'
      btn.textContent = '연결 해제'
      btn.dataset.linked = '1'
      // 다른 로그인 수단이 없으면 해제 비활성화
      const otherLinked = provider === 'google' ? p.kakao_linked : p.google_linked
      btn.disabled = !p.has_password && !otherLinked
    } else {
      statusEl.textContent = '연결 안 됨'
      btn.textContent = '연결하기'
      btn.dataset.linked = '0'
      btn.disabled = false
    }
  })
}

async function toggleSocialLink(provider) {
  const btn = document.getElementById(provider === 'google' ? 'btn-google-link-toggle' : 'btn-kakao-link-toggle')
  if (btn?.dataset.linked === '1') {
    // 연결 해제
    if (!confirm(`${provider === 'google' ? 'Google' : '카카오'} 연결을 해제할까요?`)) return
    try {
      const res = await API.post('/my/unlink/' + provider, {})
      renderLinkStatus(res.user)
      toast('연결을 해제했습니다.', 'success')
    } catch (e) {
      toast(e.message || '해제 중 오류가 발생했습니다.', 'error')
    }
    return
  }
  // 연결하기: 단기 토큰 발급 후 OAuth 왕복
  try {
    const { link_token } = await API.get('/auth/link-token')
    const builder = provider === 'google' ? buildGoogleAuthUrl : buildKakaoAuthUrl
    location.href = builder('/mypage.html', null, 'link', link_token)
  } catch (e) {
    toast(e.message || '연동을 시작하지 못했습니다.', 'error')
  }
}

// 연동 결과 토스트 (콜백 리다이렉트 파라미터)
;(function handleLinkResult() {
  const sp = new URLSearchParams(location.search)
  if (sp.get('link_success')) {
    const p = sp.get('link_success')
    toast(`${p === 'google' ? 'Google' : '카카오'} 계정을 연결했습니다.`, 'success')
    history.replaceState(null, '', location.pathname)
  } else if (sp.get('link_error')) {
    toast(decodeURIComponent(sp.get('link_error')), 'error')
    history.replaceState(null, '', location.pathname)
  }
})()

async function saveProfile() {
  const btn = document.getElementById('btn-save-profile')
  btn.disabled = true; btn.textContent = '저장 중...'
  try {
    const body = {
      name: document.getElementById('pf-name').value.trim(),
      phone: document.getElementById('pf-phone').value.trim(),
      bio: document.getElementById('pf-bio').value.trim(),
      social_links: collectLinks(),
    }
    if (pendingProfileImage !== undefined) body.profile_image = pendingProfileImage
    const res = await API.patch('/my/profile', body)
    profileData = res.user
    profilePromise = null
    pendingProfileImage = undefined
    if (typeof invalidatePhoneCache === 'function') invalidatePhoneCache()
    const stored = { ...API.user(), ...userPayloadFromProfile(res.user), phone: res.user.phone }
    localStorage.setItem('tc_user', JSON.stringify(stored))
    renderSidebar(profileData)
    toast('프로필이 저장되었습니다.', 'success')
  } catch (e) {
    toast(e.message, 'error')
  } finally {
    btn.disabled = false; btn.textContent = '프로필 저장'
  }
}

function userPayloadFromProfile(p) {
  return { name: p.name, phone: p.phone, bio: p.bio, profile_image: p.profile_image, social_links: p.social_links, member_type: p.member_type, role: p.role }
}

async function initProfile() {
  try {
    profileData = await getProfileData()
    renderSidebar(profileData)
  } catch {}
}

initProfile()

// 초기 탭
const initTab = new URLSearchParams(location.search).get('tab') || visibleTabs[0]?.id
showSection(typeof initTab === 'string' ? initTab : initTab.id)

// ── 내 강의 ──
function isLiveLikeCourse(c) {
  return c?.course_type === 'live'
    || (Number(c?.sale_price) === 0 && (c?.live_starts_at || c?.live_schedule))
}

function renderCourseThumbBadge(c) {
  if (isLiveLikeCourse(c)) {
    return `<span class="mc-live-badge mc-thumb-badge">${googleMeetIconHtml(28)}<span class="badge-meet-label">Meet</span></span>`
  }
  if (c.course_type === 'offline' || c.is_offline) {
    return '<span class="mc-type-badge mc-thumb-badge mc-type-badge--offline">OFFLINE</span>'
  }
  if (c.course_type === 'streaming') {
    return '<span class="mc-type-badge mc-thumb-badge mc-type-badge--stream">STREAM</span>'
  }
  const promo = String(c.badge || '').trim().toLowerCase()
  if (promo === 'new' || promo === 'best' || promo === 'free') {
    return `<span class="mc-promo-badge mc-thumb-badge mc-promo-badge--${promo}">${String(c.badge).toUpperCase()}</span>`
  }
  return '<span class="mc-type-badge mc-thumb-badge mc-type-badge--vod">VOD</span>'
}

function renderCourseThumbInner(c, defaultIcon = 'ti-video') {
  const thumbImg = c.thumbnail_url || c.thumbnail_image
  if (thumbImg) {
    return `<img src="${escapeHtml(thumbImg)}" alt="" loading="lazy" decoding="async" />`
  }
  return `<i class="ti ${escapeHtml(c.thumbnail_icon || defaultIcon)}"></i>`
}

function buildMeetPayload(c) {
  if (window.LiveSession?.buildLiveMeetPayload) return LiveSession.buildLiveMeetPayload(c)
  return encodeURIComponent(JSON.stringify({
    meet_code: c.meet_code,
    live_status: c.live_status,
    live_ended: c.live_ended,
    live_starts_at: c.live_starts_at,
    live_schedule: c.live_schedule,
    live_resources: c.live_resources,
  }))
}

function renderLiveMeetBtn(c, start) {
  if (window.LiveSession?.meetButtonHtml) {
    return LiveSession.meetButtonHtml(c, start, true, { enrolledMode: true })
  }
  return ''
}

function renderLiveMaterialButton(c) {
  if (!isLiveLikeCourse(c) || !c.my_review?.rating) return ''
  if (!c.live_resources?.material_available) return ''
  return `<button type="button" class="btn-enroll btn-enroll--material" onclick="event.stopPropagation();LiveSession.openMaterial('${escapeHtml(c.id)}')"><i class="ti ti-download"></i> 강의자료 다운로드</button>`
}

function renderLiveCourseCard(c) {
  const LS = window.LiveSession
  const start = LS ? LS.parseLiveStart(c) : (c.live_starts_at ? new Date(c.live_starts_at) : null)
  const meetPayload = buildMeetPayload(c)
  const isEnded = c.live_resources?.live_ended || c.live_ended || c.live_status === 'ended'

  const replayBtn = LS && isEnded && !c.access?.access_expired && !c.live_resources?.replay_expired
    ? (LS.endedReplayButtonHtml?.(c) || '')
    : ''
  const materialBtn = renderLiveMaterialButton(c)
  const meetWrap = !isEnded
    ? `<div data-live-meet-wrap data-live-meet-enrolled="1" data-live-meet-compact="1" data-live-course="${meetPayload}">${renderLiveMeetBtn(c, start)}</div>`
    : ''
  const hasActions = replayBtn || materialBtn || meetWrap

  return `<div class="my-lc-card">
    <a href="/course.html?slug=${escapeHtml(c.slug)}" class="my-lc-main">
      <div class="lc-thumb-wrap">
        <div class="mc-thumb ${c.thumb_style==='dark'?'thumb-dark':'thumb-light'}">
          ${renderCourseThumbBadge(c)}
          ${renderCourseThumbInner(c, 'ti-broadcast')}
        </div>
      </div>
      <div class="my-lc-info">
        <span class="mc-cat">${escapeHtml(c.category)}</span>
        <div class="my-lc-title">${escapeHtml(c.title)}</div>
        ${c.live_schedule ? `<div class="my-lc-meta"><i class="ti ti-calendar-event"></i> ${escapeHtml(c.live_schedule)}</div>` : ''}
      </div>
    </a>
    ${hasActions ? `<div class="my-lc-actions">${replayBtn}${materialBtn}${meetWrap}</div>` : ''}
    ${renderCourseReviewBlock(c)}
    ${renderCancelAction(c)}
  </div>`
}

function renderCancelAction(c) {
  if (c.can_cancel === false) {
    return c.cancel_hint ? `<div class="mc-cancel-hint">${escapeHtml(c.cancel_hint)}</div>` : ''
  }
  const label = c.cancel_label || (c.paid_amount > 0 ? '환불 신청' : '신청 취소')
  const refundNote = c.paid_amount > 0 && c.refund_preview > 0
    ? `<div class="mc-cancel-hint">예상 환불액 ₩${Number(c.refund_preview).toLocaleString()}</div>`
    : ''
  return `${refundNote}<div class="mc-actions"><button type="button" class="mc-cancel-btn" onclick="cancelEnrollment('${c.id}')">${label}</button></div>`
}

async function cancelEnrollment(courseId) {
  let preview
  try {
    preview = await API.get('/my/courses/' + courseId + '/cancel-preview')
  } catch (e) {
    toast(e.message || '취소 정보를 불러오지 못했습니다.', 'error')
    return
  }
  if (!preview.allowed) {
    toast(preview.message || '취소·환불할 수 없습니다.', 'error')
    return
  }
  const courseTitle = preview.course_title || '강의'
  const isRefund = preview.type === 'refund'
  const refundLine = isRefund && preview.refund_amount > 0
    ? `\n예상 환불액: ₩${Number(preview.refund_amount).toLocaleString()}`
    : ''
  const msg = `${courseTitle}\n\n${isRefund ? '환불' : '수강 신청 취소'}를 진행할까요?${refundLine}\n\n· 작성한 기대평이 삭제됩니다.\n· 발급된 기대평·후기 할인 쿠폰이 회수됩니다.\n· 수강 진도가 초기화됩니다.`
  if (!confirm(msg)) return
  try {
    const res = await API.post('/my/courses/' + courseId + '/cancel', {})
    let done = isRefund ? '환불 처리되었습니다.' : '수강 신청이 취소되었습니다.'
    if (res.refund_amount > 0) done += ` (₩${Number(res.refund_amount).toLocaleString()})`
    if (res.anticipation_deleted) done += ' 기대평이 삭제되었습니다.'
    if (res.coupons_recalled) done += ' 쿠폰이 회수되었습니다.'
    toast(done, 'success')
    document.getElementById('my-courses').dataset.loaded = ''
    loadCourses()
  } catch (e) {
    toast(e.message || '처리 중 오류가 발생했습니다.', 'error')
  }
}

function renderCourseReviewBlock(c) {
  const rating = c.my_review?.rating || 0
  const content = escapeHtml(c.my_review?.content || '')
  const reviewOpen = c.live_resources?.review_open !== false
    || (isLiveLikeCourse(c) && c.live_resources?.replay_available)
  const makeStars = (r, disabled) => [1,2,3,4,5].map(n =>
    disabled
      ? `<span class="lc-star ${n <= r ? 'on' : ''}">★</span>`
      : `<button type="button" class="lc-star ${n <= r ? 'on' : ''}" data-star="${n}" onclick="setReviewStar('${c.id}',${n})">★</button>`
  ).join('')

  if (c.my_review) {
    if (isLiveLikeCourse(c) && c.live_resources?.material_available) {
      return `<div class="my-lc-review my-lc-review--material-only" id="review-course-${escapeHtml(c.id)}" hidden></div>`
    }

    // 기간 만료 시 수정 버튼 숨김
    const editBtn = reviewOpen
      ? `<button type="button" class="lc-edit-btn" onclick="toggleReviewEdit('${c.id}')">수정</button>`
      : `<span class="lc-review-closed-badge">수정 기간 종료</span>`
    return `<div class="my-lc-review" id="review-course-${escapeHtml(c.id)}">
      <div class="lc-review-done">
        <div class="lc-review-done-left">
          <div class="lc-stars-row">${makeStars(rating, true)}</div>
          <span class="lc-review-done-txt">후기를 남겨주셨어요</span>
        </div>
        ${editBtn}
      </div>
      ${reviewOpen ? `<div class="lc-review-form" id="review-form-${escapeHtml(c.id)}" style="display:none">
        <div class="lc-stars-row" id="review-stars-${c.id}">${makeStars(rating, false)}</div>
        <textarea class="lc-review-ta" id="review-content-${c.id}" placeholder="수강 후기를 남겨주세요.">${content}</textarea>
        <div class="lc-review-footer">
          <button type="button" class="lc-review-save" onclick="submitCourseReview('${c.id}')">후기 저장</button>
        </div>
      </div>` : ''}
    </div>`
  }

  if (!reviewOpen) {
    return `<div class="my-lc-review my-lc-review--closed">
      <span class="lc-review-closed-msg">후기 작성 기간이 종료되었습니다. (강의 종료 후 7일)</span>
    </div>`
  }

  return `<div class="my-lc-review" id="review-course-${escapeHtml(c.id)}">
    <div class="lc-review-form" id="review-form-${escapeHtml(c.id)}">
      <div class="lc-review-header">
        <span class="lc-review-label">강의 어떠셨나요?</span>
        <span class="lc-coupon-badge">후기 작성 시 10% 쿠폰 지급</span>
      </div>
      <div class="lc-stars-row" id="review-stars-${c.id}">${makeStars(0, false)}</div>
      <textarea class="lc-review-ta" id="review-content-${c.id}" placeholder="자유롭게 작성해주세요. (선택)"></textarea>
      <div class="lc-review-footer">
        <button type="button" class="lc-review-save" onclick="submitCourseReview('${c.id}')">저장하기</button>
      </div>
    </div>
  </div>`
}

function toggleReviewEdit(courseId) {
  const form = document.getElementById('review-form-' + courseId)
  if (!form) return
  form.style.display = form.style.display === 'none' ? '' : 'none'
}

const reviewRatings = {}

function setReviewStar(courseId, rating) {
  reviewRatings[courseId] = rating
  const wrap = document.getElementById('review-stars-' + courseId)
  if (!wrap) return
  wrap.querySelectorAll('.lc-star').forEach(btn => {
    btn.classList.toggle('on', Number(btn.dataset.star) <= rating)
  })
}

async function submitCourseReview(courseId) {
  const stars = document.getElementById('review-stars-' + courseId)
  const active = stars?.querySelectorAll('.lc-star.on').length || reviewRatings[courseId] || 0
  const rating = reviewRatings[courseId] || active
  if (!rating) {
    toast('별점을 선택해주세요.', 'error')
    return
  }
  const content = document.getElementById('review-content-' + courseId)?.value?.trim() || ''
  try {
    const res = await API.post('/my/reviews', { course_id: courseId, rating, content })
    toast('후기가 저장되었습니다.', 'success')
    document.getElementById('my-courses').dataset.loaded = ''
    myCoursesPromise = null
    window.__myCoursesPromise = null
    await loadCourses({ refresh: true })
  } catch (e) {
    toast(e.message || '후기 저장 중 오류가 발생했습니다.', 'error')
  }
}

async function loadCourses({ refresh = false } = {}) {
  const el = document.getElementById('my-courses')
  if (!refresh && el.dataset.loaded) return
  try {
    if (window.LiveSession?.whenReady) await LiveSession.whenReady
    const courses = await getMyCourses({ refresh })
    el.dataset.loaded = '1'
    courses.forEach(c => {
      if (c.my_review?.rating) reviewRatings[c.id] = c.my_review.rating
    })
    if (!courses.length) {
      el.innerHTML = `<div class="empty-state"><i class="ti ti-book-off"></i><p>아직 수강 중인 강의가 없습니다.<br><a href="/">강의 둘러보기 →</a></p></div>`
      return
    }
    el.innerHTML = `<div class="my-course-grid">${courses.map(c => {
      if (isLiveLikeCourse(c)) return renderLiveCourseCard(c)
      const pct = c.total_chapters > 0 ? Math.round((c.completed_chapters / c.total_chapters) * 100) : 0
      const accessExpired = c.access?.access_expired
      const playerHref = accessExpired
        ? `/course.html?slug=${escapeHtml(c.slug)}`
        : `/player.html?slug=${escapeHtml(c.slug)}&chapter=${escapeHtml(c.last_chapter_id || 'first')}`
      return `<div class="my-course-card my-course-card--wrap${accessExpired ? ' my-course-card--expired' : ''}">
        <a href="${playerHref}" class="mc-link">
        <div class="mc-thumb ${c.thumb_style==='dark'?'thumb-dark':'thumb-light'}">
          ${renderCourseThumbBadge(c)}
          ${renderCourseThumbInner(c)}
          ${pct === 100 ? '<div class="mc-done"><i class="ti ti-check"></i> 완료</div>' : ''}
        </div>
        <div class="mc-body">
          <div class="mc-cat">${escapeHtml(c.category)}</div>
          <div class="mc-title">${escapeHtml(c.title)}</div>
          <div class="mc-progress-row">
            <div class="mc-bar-wrap"><div class="mc-bar" style="width:${pct}%"></div></div>
            <span class="mc-pct">${pct}%</span>
          </div>
          <div class="mc-meta">${c.completed_chapters}/${c.total_chapters}강 완료${accessExpired ? ' · <span class="mc-access-expired">수강 기간 만료</span>' : (c.access?.access_ends_at ? ` · ${formatAccessUntil(c.access.access_ends_at)}까지` : '')}</div>
        </div>
        </a>
        ${renderCourseReviewBlock(c)}
        ${renderCancelAction(c)}
      </div>`
    }).join('')}</div>`
    if (window.LiveSession) LiveSession.startCountdownTicker()
    openRequestedReview()
  } catch(e) {
    el.innerHTML = '<p style="color:#aaa;text-align:center">강의를 불러오지 못했습니다.</p>'
  }
}

function openRequestedReview() {
  const courseId = new URLSearchParams(location.search).get('review_course')
  if (!courseId) return
  const review = document.getElementById('review-course-' + courseId)
  if (!review) return
  review.open = true
  review.scrollIntoView({ behavior: 'smooth', block: 'center' })
  setTimeout(() => document.getElementById('review-content-' + courseId)?.focus(), 300)
}

// ── 에디터즈 프로필 ──
const EDITOR_LOCATIONS = ['서울','경기','인천','부산','대구','광주','대전','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주','해외·원격']
const WORK_TYPE_LABELS = { remote:'원격·재택', hybrid:'하이브리드', onsite:'현장 근무', project:'프로젝트 단위', fulltime:'풀타임·장기' }

async function loadEditorProfile() {
  const wrap = document.getElementById('editor-profile-wrap')
  if (wrap.dataset.loaded) return
  try {
    const app = await API.get('/editor/my-application')
    if (!app || app.status !== 'approved') {
      wrap.innerHTML = `<div class="empty-state"><i class="ti ti-rosette"></i><p>승인된 에디터즈만 이용할 수 있습니다.<br><a href="/editor-program.html" style="color:#111111;font-weight:700">에디터즈 신청하기 →</a></p></div>`
      wrap.dataset.loaded = '1'
      return
    }
    const featuredActive = app.is_featured

    const locOpts = EDITOR_LOCATIONS.map(l => `<option value="${l}" ${app.location === l ? 'selected' : ''}>${l}</option>`).join('')
    const wtOpts = (app.work_type_options || Object.entries(WORK_TYPE_LABELS).map(([value, label]) => ({ value, label })))
      .map(o => `<option value="${o.value}" ${app.work_type === o.value ? 'selected' : ''}>${o.label}</option>`).join('')
    wrap.innerHTML = `
      <div class="featured-banner ${featuredActive ? 'active' : ''}">
        <h4>${featuredActive ? '⭐ 명단 상단 노출 중' : '상위노출 쿠폰'}</h4>
        <p>${featuredActive
          ? `~ ${untilStr}까지 에디터즈 목록 상단에 노출됩니다.`
          : '승격(승인) 시 1주일 상위노출이 적용되고, 수강생은 상위노출 쿠폰 2만원×5장이 발급됩니다.'}</p>
      </div>
      <div class="profile-form-card">
        <div class="pf-field">
          <label>활동 지역</label>
          <select id="ed-location"><option value="">선택</option>${locOpts}</select>
        </div>
        <div class="pf-field">
          <label>희망 근무 형태</label>
          <select id="ed-work-type"><option value="">선택</option>${wtOpts}</select>
        </div>
        <div class="pf-field">
          <label>에디터 소개 <span class="pf-hint">에디터즈 목록에 표시</span></label>
          <textarea id="ed-intro" maxlength="1000">${escapeHtml(app.intro || '')}</textarea>
        </div>
        <div class="pf-field">
          <label>포트폴리오 링크</label>
          <input type="url" id="ed-portfolio" value="${escapeHtml(app.portfolio_url || '')}" placeholder="https://..." />
        </div>
        <button type="button" class="btn-save-profile" onclick="saveEditorProfile()">에디터즈 프로필 저장</button>
      </div>`
    wrap.dataset.loaded = '1'
  } catch(e) {
    wrap.innerHTML = '<p style="color:#aaa;text-align:center">에디터즈 프로필을 불러오지 못했습니다.</p>'
  }
}

async function saveEditorProfile() {
  const location = document.getElementById('ed-location')?.value
  const work_type = document.getElementById('ed-work-type')?.value
  const intro = document.getElementById('ed-intro')?.value.trim()
  const portfolio_url = document.getElementById('ed-portfolio')?.value.trim()
  if (!location) return alert('활동 지역을 선택해주세요.')
  if (!work_type) return alert('희망 근무 형태를 선택해주세요.')
  try {
    await API.patch('/editor/profile', { location, work_type, intro, portfolio_url: portfolio_url || null })
    alert('에디터즈 프로필이 저장되었습니다.')
    const wrap = document.getElementById('editor-profile-wrap')
    delete wrap.dataset.loaded
    loadEditorProfile()
  } catch(e) {
    alert(e.message || '저장 중 오류가 발생했습니다.')
  }
}

// ── 내 쿠폰 ──
async function loadCoupons() {
  const el = document.getElementById('my-coupons')
  if (el.dataset.loaded) return
  try {
    const coupons = await API.get('/my/coupons')
    el.dataset.loaded = '1'
    const visible = coupons.filter(c => c.status !== 'revoked')
    if (!visible.length) {
      el.innerHTML = `<div class="empty-state"><i class="ti ti-ticket-off"></i><p>보유한 쿠폰이 없습니다.</p></div>`
      return
    }
    el.innerHTML = `<div class="coupon-list">${visible.map(c => {
      const isFeatured = c.reason === 'editor_featured' || c.coupon_type === 'editor_featured'
        || c.reason === 'editor_apply_featured' || c.coupon_type === 'editor_apply_featured'
      const isApplyFeatured = c.reason === 'editor_apply_featured'
      const isPercent = c.discount_percent > 0 || c.reason === 'anticipation_review' || c.reason === 'course_review_five_star'
      const amountHtml = isFeatured
        ? (c.amount > 0
          ? `<div class="coupon-amount">${c.amount.toLocaleString()}원 · 상위노출 7일</div>`
          : '<div class="coupon-amount">상위노출 7일</div>')
        : isPercent
        ? `<div class="coupon-amount">${c.discount_percent || 10}% 할인</div>`
        : `<div class="coupon-amount">${(c.amount || 0).toLocaleString()}원 할인</div>`
      const issuance = c.issuance || {}
      const reasonHtml = issuance.source
        ? [
            issuance.source,
            issuance.route ? `발급 경로: ${issuance.route}` : '',
            issuance.benefit || '',
            issuance.course_title ? `대상 강의: ${issuance.course_title}` : '',
          ].filter(Boolean).join(' · ')
        : isApplyFeatured
        ? '에디터즈 승격 혜택 · 명단 상단 노출'
        : isFeatured
        ? '에디터즈 승인 혜택 · 명단 상단 노출'
        : c.reason === 'marketing_consent' ? '마케팅 동의 혜택'
        : c.reason === 'anticipation_review' ? '강의 기대평 작성 혜택 · 최초 강의 결제 10% 할인'
        : c.reason === 'course_review_five_star' ? '수강 후기 5점 혜택 · 기대평 쿠폰과 중첩 10% 할인'
        : c.reason === 'client_course_reward' ? '의뢰인 수강 혜택 · 3만원 이상 의뢰 시 1만원 할인' : c.reason
      const useBtn = isFeatured && c.status === 'available'
        ? `<button type="button" class="btn-settings-action" onclick="useFeaturedCoupon('${c.id}')">상위노출 적용</button>`
        : ''
      const themeClass = c.reason === 'anticipation_review' ? 'coupon-ticket--anticipation'
        : c.reason === 'course_review_five_star' ? 'coupon-ticket--review5'
        : c.reason === 'client_course_reward' ? 'coupon-ticket--client-reward'
        : isFeatured ? 'coupon-ticket--editor'
        : c.reason === 'marketing_consent' ? 'coupon-ticket--marketing'
        : ''
      const stateClass = c.status === 'available' ? '' : c.status === 'expired' ? 'coupon-ticket--expired' : 'coupon-ticket--used'
      const badgeLabel = c.reason === 'anticipation_review' ? '기대평 쿠폰'
        : c.reason === 'course_review_five_star' ? '5성 후기 쿠폰'
        : c.reason === 'client_course_reward' ? '의뢰인 혜택'
        : isApplyFeatured ? '에디터즈 승격'
        : isFeatured ? '에디터즈 쿠폰'
        : c.reason === 'marketing_consent' ? '마케팅 혜택'
        : '할인 쿠폰'
      const untilNote = (c.reason === 'anticipation_review' || c.reason === 'course_review_five_star') && c.expires_at
        ? `<div class="coupon-until"><i class="ti ti-clock" aria-hidden="true"></i> ~ ${c.expires_at.slice(0, 10)}까지</div>`
        : c.reason === 'client_course_reward' && c.expires_at
        ? `<div class="coupon-until"><i class="ti ti-clock" aria-hidden="true"></i> ~ ${c.expires_at.slice(0, 10)}까지</div>`
        : isFeatured && c.featured_until
        ? `<div class="coupon-until"><i class="ti ti-clock" aria-hidden="true"></i> ~ ${c.featured_until.slice(0,10)}</div>`
        : ''
      const statusLabel = c.status === 'available' ? '✦ 사용 가능' : c.status === 'expired' ? '만료됨' : '사용 완료'
      const usageHtml = c.status === 'used' && c.usage
        ? `<div class="coupon-usage">
            ${c.usage.context_label}${c.usage.target_title ? ` · ${c.usage.target_title}` : ''}
            ${c.usage.detail ? `<br>${c.usage.detail}` : ''}
            ${c.usage.used_at ? `<br>${c.usage.used_at.slice(0, 10)} 사용` : ''}
          </div>`
        : ''
      return `
      <div class="coupon-ticket ${themeClass} ${stateClass}">
        <div class="coupon-ticket__main">
          <div class="coupon-ticket__badge">${badgeLabel}</div>
          ${amountHtml}
          <div class="coupon-reason">${reasonHtml}</div>
          ${untilNote}
          ${usageHtml}
        </div>
        <div class="coupon-ticket__tear" aria-hidden="true"></div>
        <div class="coupon-ticket__stub">
          <div class="coupon-code">${c.code}</div>
          <div class="coupon-status ${c.status}">${statusLabel}</div>
          ${useBtn}
        </div>
      </div>`
    }).join('')}</div>`
  } catch(e) {
    el.innerHTML = '<p style="color:#aaa;text-align:center">쿠폰 정보를 불러오지 못했습니다.</p>'
  }
}

async function useFeaturedCoupon(couponId) {
  if (!confirm('상위노출 쿠폰을 사용하시겠습니까? 7일간 에디터즈 목록 상단에 노출됩니다.')) return
  try {
    await API.post('/editor/featured-coupon', { coupon_id: couponId })
    alert('상위노출이 적용되었습니다.')
    const el = document.getElementById('my-coupons')
    delete el.dataset.loaded
    loadCoupons()
    const wrap = document.getElementById('editor-profile-wrap')
    if (wrap) { delete wrap.dataset.loaded; loadEditorProfile() }
  } catch(e) {
    alert(e.message || '쿠폰 사용 중 오류가 발생했습니다.')
  }
}

// ── 마케팅 철회 ──
async function withdrawMarketing() {
  if (!confirm('마케팅 정보 수신 동의를 철회하시겠습니까?')) return
  try {
    await API.del('/my/marketing-consent')
    alert('마케팅 수신 동의가 철회되었습니다.')
    document.getElementById('btn-marketing-toggle').style.display = 'none'
    document.getElementById('marketing-status').textContent = '철회 완료'
  } catch(e) {
    alert('처리 중 오류가 발생했습니다.')
  }
}
</script>
<script src="/js/coupon-guide-popup.js" defer></script>
