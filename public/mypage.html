<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=6" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/mypage.css?v=2" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    body { background:#f5f6fa; }
    .mypage-wrap { max-width:1060px; margin:0 auto; padding:32px 20px 80px; display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start; }

    /* 사이드바 */
    .my-sidebar { background:#fff; border:1px solid #eee; border-radius:14px; padding:24px; position:sticky; top:80px; text-align:center; }
    .my-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#5c67f2,#7b84ff); color:#fff; font-size: 26.4px; font-weight:800; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
    .my-name { font-size: 19.2px; font-weight:800; margin-bottom:4px; }
    .my-email { font-size: 14.4px; color:#aaa; margin-bottom:6px; }
    .my-role-badges { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:20px; }
    .my-role {
      position: relative;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 16px;
      letter-spacing: 0.03em;
      display: inline-block;
      border-radius: 4px;
      line-height: 1.35;
    }
    .my-role::before,
    .my-role::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      transform: translateY(-50%);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
    }
    .my-role::before { left: -3.5px; }
    .my-role::after { right: -3.5px; }
    .my-role.admin {
      background: linear-gradient(145deg, #f3d875 0%, #d4a017 38%, #b8860b 62%, #e8c84a 100%);
      color: #3d2e00;
      border: 1px solid #a67c00;
      box-shadow: 0 1px 5px rgba(168, 124, 0, 0.35);
    }
    .my-role.student {
      background: #111;
      color: #fff;
      border: 1px solid #222;
    }
    .my-role.editor { background:#f0f2ff; color:#5c67f2; border:1px solid #d8dcff; }
    .my-role.client { background:#fff4e8; color:#c96a1a; border:1px solid #f0dcc8; }
    .my-nav-panel,
    .my-nav-logout-panel {
      background: #f9fafb;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 6px;
    }
    .my-sidebar-menus {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
      text-align: left;
    }
    .my-nav { display:flex; flex-direction:column; gap:2px; }
    .my-nav-item {
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
      padding:11px 12px;
      border-radius:8px;
      font-size:15.6px;
      font-weight:600;
      color:#555;
      cursor:pointer;
      transition:.15s;
      text-decoration:none;
      text-align:left;
      width:100%;
      box-sizing:border-box;
    }
    .my-nav-item:hover { background:#fff; color:#1a1a1a; }
    .my-nav-item.active { background:#fff; color:#5c67f2; box-shadow:0 0 0 1px #e8ecff; }
    .my-nav-item i { font-size:19.2px; flex-shrink:0; width:20px; text-align:center; }
    .my-nav-item--logout {
      background:#e53935;
      color:#fff !important;
      justify-content:center;
    }
    .my-nav-item--logout:hover { background:#c62828; color:#fff !important; }

    /* 메인 */
    .my-main { min-width:0; }
    .my-section { display:none; }
    .my-section.active { display:block; }
    .section-title { font-size: 24px; font-weight:900; margin-bottom:20px; }

    /* 강의 카드 */
    .my-course-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
    .my-course-card { background:#fff; border:1px solid #eee; border-radius:12px; overflow:hidden; text-decoration:none; transition:.2s; }
    .my-course-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.08); transform:translateY(-2px); }
    .mc-thumb { font-size: 43.2px; }
    .mc-thumb.thumb-dark { background:linear-gradient(135deg,#111827,#1e2d4a); color:#fff; }
    .mc-thumb.thumb-light { background:linear-gradient(135deg,#f5f5f5,#eeeeee); color:#111111; }
    .mc-done { position:absolute; bottom:8px; right:8px; background:#333333; color:#fff; font-size: 12px; font-weight:700; padding:2px 8px; border-radius:10px; display:flex; align-items:center; gap:4px; }
    /* 내 강의 썸네일 딱지 — 유형 뱃지는 축소, Meet는 2배·우측 */
    .my-course-card .mc-thumb-badge {
      transform: scale(0.25);
      transform-origin: top left;
      z-index: 2;
    }
    .my-course-card .mc-live-badge.mc-thumb-badge {
      left: auto;
      right: 8px;
      top: 8px;
      transform: scale(0.5);
      transform-origin: top right;
    }
    .my-course-card .mc-type-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 16.8px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      line-height: 1.1;
      white-space: nowrap;
    }
    .my-course-card .mc-type-badge--vod { background: #f5f5f5; color: #555; border: 1px solid #e8e8e8; }
    .my-course-card .mc-type-badge--stream { background: #ffebee; color: #e53935; border: 1px solid #ffcdd2; }
    .my-course-card .mc-type-badge--offline { background: var(--badge-offline); color: #fff; }
    .my-course-card .mc-promo-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 16.8px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      line-height: 1.1;
      color: #fff;
    }
    .my-course-card .mc-promo-badge--new { background: var(--badge-new); }
    .my-course-card .mc-promo-badge--best { background: var(--badge-best); }
    .my-course-card .mc-promo-badge--free { background: var(--badge-free); }
    .mc-body { padding:12px; }
    .mc-cat { font-size: 13.2px; color:#111111; font-weight:700; margin-bottom:4px; }
    .mc-title { font-size: 15.6px; font-weight:700; color:#1a1a1a; margin-bottom:10px; line-height:1.4; }
    .mc-progress-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .mc-bar-wrap { flex:1; height:4px; background:#eee; border-radius:2px; }
    .mc-bar { height:4px; background:#111111; border-radius:2px; transition:.3s; }
    .mc-pct { font-size: 13.2px; font-weight:700; color:#111111; }
    .mc-meta { font-size: 13.2px; color:#aaa; }
    .my-course-card--wrap { display:flex; flex-direction:column; }
    .my-course-card--wrap .mc-link { text-decoration:none; color:inherit; flex:1; display:block; }
    .mc-actions { padding:0 12px 12px; display:flex; gap:8px; flex-wrap:wrap; }
    .mc-actions--live {
      flex-direction: column;
      flex-wrap: nowrap;
      gap: 10px;
    }
    .mc-actions--live .live-extra-actions { display: contents; }
    .mc-cancel-btn {
      flex:1; min-width:0; padding:8px 10px; border-radius:8px; border:1px solid #e8e8e8;
      background:#fff; color:#666; font-size:13px; font-weight:700; cursor:pointer;
    }
    .mc-cancel-btn:hover { background:#f5f5f5; border-color:#dddddd; color:#111111; }
    .mc-cancel-btn:disabled { opacity:.45; cursor:not-allowed; background:#fafafa; color:#aaa; }
    .mc-cancel-hint { font-size:12px; color:#aaa; padding:0 12px 12px; line-height:1.5; }
    .proj-list { display:flex; flex-direction:column; gap:12px; }
    .proj-card { background:#fff; border:1px solid #eee; border-radius:12px; padding:18px 20px; display:flex; justify-content:space-between; align-items:center; gap:12px; transition:.15s; }
    .proj-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.07); }
    .pc-left { flex:1; min-width:0; }
    .pc-cat { font-size: 13.2px; font-weight:700; color:#111111; background:#f5f5f5; padding:2px 8px; border-radius:10px; display:inline-block; margin-bottom:6px; }
    .pc-title { font-size: 18px; font-weight:800; color:#1a1a1a; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pc-meta { font-size: 14.4px; color:#aaa; }
    .pc-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
    .status-badge { font-size: 13.2px; font-weight:700; padding:3px 10px; border-radius:10px; }
    .status-badge.open { background:#f5f5f5; color:#333333; }
    .status-badge.matched { background:#fff8e8; color:#d4991a; }
    .status-badge.contract, .status-badge.in_progress { background:#f5f5f5; color:#111111; }
    .status-badge.delivered { background:#fff0e8; color:#e06030; }
    .status-badge.completed { background:#f0f0f0; color:#888; }
    .status-badge.cancelled { background:#fff0f0; color:#111111; }
    .pc-btn { font-size: 14.4px; font-weight:700; padding:6px 14px; border-radius:7px; text-decoration:none; border:none; cursor:pointer; }
    .pc-btn.primary { background:#111111; color:#fff; }
    .pc-btn.secondary { background:#f0f0f0; color:#555; }

    /* 견적 카드 */
    .quote-list { display:flex; flex-direction:column; gap:12px; }
    .quote-card { background:#fff; border:1px solid #eee; border-radius:12px; padding:18px 20px; }
    .qc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .qc-project { font-size: 15.6px; font-weight:700; color:#1a1a1a; }
    .qc-amount { font-size: 19.2px; font-weight:900; color:#111111; }
    .qc-msg { font-size: 15.6px; color:#666; line-height:1.6; margin-bottom:10px; }
    .qc-bottom { display:flex; justify-content:space-between; align-items:center; }
    .qc-meta { font-size: 14.4px; color:#aaa; }
    .qs-badge { font-size: 13.2px; font-weight:700; padding:3px 10px; border-radius:10px; }
    .qs-badge.pending { background:#f5f5f5; color:#111111; }
    .qs-badge.accepted { background:#f5f5f5; color:#333333; }
    .qs-badge.rejected { background:#f0f0f0; color:#aaa; }

    /* 쿠폰 — 영화제 티켓 스타일 */
    .coupon-list { display:flex; flex-direction:column; gap:18px; }
    .coupon-ticket {
      --ct-bg:    #141428;
      --ct-bg2:   #1e1e3c;
      --ct-color: #e8c96a;
      --ct-hole:  #f5f6fa;
      --stub-w:   156px;
      --notch:    11px;
      display:flex; align-items:stretch; position:relative;
      border-radius:14px;
      background:linear-gradient(135deg, var(--ct-bg) 0%, var(--ct-bg2) 100%);
      box-shadow:0 8px 32px rgba(0,0,0,.28), 0 2px 6px rgba(0,0,0,.18);
      overflow:hidden; color:#fff;
    }
    /* 쿠폰 유형별 컬러 */
    .coupon-ticket--anticipation  { --ct-bg:#12122a; --ct-bg2:#1e1e46; --ct-color:#ffd166; }
    .coupon-ticket--review5       { --ct-bg:#2a0e20; --ct-bg2:#3d1530; --ct-color:#ff8ab4; }
    .coupon-ticket--client-reward { --ct-bg:#0a2218; --ct-bg2:#14342a; --ct-color:#4ecb71; }
    .coupon-ticket--editor        { --ct-bg:#1c0a2e; --ct-bg2:#2a1248; --ct-color:#c084fc; }
    .coupon-ticket--marketing     { --ct-bg:#1c140a; --ct-bg2:#2e2010; --ct-color:#f59e0b; }
    /* 반치형 노치 */
    .coupon-ticket::before,
    .coupon-ticket::after {
      content:''; position:absolute;
      right:calc(var(--stub-w) - var(--notch));
      width:calc(var(--notch) * 2); height:calc(var(--notch) * 2);
      border-radius:50%; background:var(--ct-hole); z-index:3;
    }
    .coupon-ticket::before { top:calc(var(--notch) * -1); }
    .coupon-ticket::after  { bottom:calc(var(--notch) * -1); }
    /* 사용·만료 */
    .coupon-ticket--used,
    .coupon-ticket--expired { opacity:.42; filter:grayscale(.55); }
    /* 메인 영역 */
    .coupon-ticket__main {
      flex:1; min-width:0; padding:20px 18px 20px 14px; position:relative; overflow:hidden;
    }
    /* 필름 천공 — 왼쪽 세로 */
    .coupon-ticket__main::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:22px;
      background:repeating-linear-gradient(
        180deg,
        transparent 0, transparent 5px,
        rgba(255,255,255,.11) 5px, rgba(255,255,255,.11) 13px,
        transparent 13px, transparent 18px
      );
    }
    /* 우측 흐릿한 원형 워터마크 */
    .coupon-ticket__main::after {
      content:''; position:absolute;
      right:-50px; top:50%; transform:translateY(-50%);
      width:160px; height:160px; border-radius:50%;
      border:36px solid rgba(255,255,255,.04);
    }
    .coupon-ticket__badge {
      display:inline-block; font-size:9px; font-weight:700;
      letter-spacing:.14em; text-transform:uppercase;
      color:var(--ct-color); opacity:.8;
      margin-bottom:6px; padding-left:26px;
    }
    .coupon-amount {
      font-size:30px; font-weight:900; color:var(--ct-color);
      line-height:1.1; letter-spacing:-.02em; padding-left:26px;
    }
    .coupon-reason {
      font-size:13px; color:rgba(255,255,255,.5);
      margin-top:7px; line-height:1.5; padding-left:26px;
    }
    .coupon-until {
      font-size:11px; color:rgba(255,255,255,.3);
      margin-top:5px; padding-left:26px;
    }
    .coupon-usage {
      font-size:11px; color:rgba(255,255,255,.3);
      margin-top:7px; line-height:1.5; padding-left:26px;
    }
    /* 뜯는 선 */
    .coupon-ticket__tear {
      flex-shrink:0; width:0;
      border-left:2px dashed rgba(255,255,255,.18);
      margin:14px 0; position:relative; z-index:1;
    }
    /* 스텁 */
    .coupon-ticket__stub {
      flex-shrink:0; width:var(--stub-w);
      padding:16px 14px;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; text-align:center; gap:9px;
      background:rgba(0,0,0,.22);
    }
    .coupon-code {
      font-size:12px; font-weight:700;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      color:var(--ct-color); letter-spacing:.1em; word-break:break-all;
      background:rgba(255,255,255,.07); padding:7px 10px;
      border-radius:6px; border:1px solid rgba(255,255,255,.1); width:100%;
    }
    .coupon-status {
      font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      padding:4px 12px; border-radius:20px;
    }
    .coupon-status.available {
      background:rgba(255,255,255,.1); color:#fff;
      border:1px solid rgba(255,255,255,.22);
    }
    .coupon-status.used,
    .coupon-status.expired {
      background:rgba(255,255,255,.04); color:rgba(255,255,255,.28);
      border:1px solid rgba(255,255,255,.08);
    }
    .coupon-ticket__stub .btn-settings-action {
      background:var(--ct-color); color:#000; border:none;
      border-radius:7px; font-size:12px; font-weight:700;
      padding:7px 12px; width:100%; max-width:130px; cursor:pointer; margin-top:2px;
    }
    @media (max-width:560px) {
      .coupon-ticket { flex-direction:column; --stub-w:100%; }
      .coupon-ticket::before, .coupon-ticket::after { display:none; }
      .coupon-ticket__tear {
        width:auto; height:0; border-left:none;
        border-top:2px dashed rgba(255,255,255,.18); margin:0 16px;
      }
      .coupon-ticket__stub { width:100%; flex-direction:row; flex-wrap:wrap; justify-content:space-between; }
    }

    /* 설정 */
    .settings-card { background:#fff; border:1px solid #eee; border-radius:12px; padding:20px; }
    .settings-row { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .settings-label { font-size: 16.8px; font-weight:700; margin-bottom:4px; }
    .settings-desc { font-size: 14.4px; color:#aaa; line-height:1.6; }
    .btn-settings-action { padding:8px 16px; border:1.5px solid #111111; color:#111111; background:#fff; border-radius:8px; font-size: 15.6px; font-weight:700; cursor:pointer; }
    .btn-settings-action:hover { background:#f5f5f5; }

    /* 프로필 수정 */
    .profile-form-card { background:#fff; border:1px solid #eee; border-radius:12px; padding:24px; margin-bottom:16px; }
    .profile-photo-row { display:flex; align-items:center; gap:20px; margin-bottom:24px; flex-wrap:wrap; }
    .profile-photo-preview { width:88px; height:88px; border-radius:50%; background:linear-gradient(135deg,#111111,#333333); color:#fff; font-size:36px; font-weight:800; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
    .profile-photo-preview img { width:100%; height:100%; object-fit:cover; }
    .profile-photo-actions { display:flex; flex-direction:column; gap:8px; }
    .profile-photo-actions label { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:#f5f6fa; border:1px solid #ddd; border-radius:8px; font-size:14.4px; font-weight:600; color:#555; cursor:pointer; width:fit-content; }
    .profile-photo-actions label:hover { background:#eef0f5; }
    .profile-photo-actions input[type=file] { display:none; }
    .btn-photo-remove { background:none; border:none; color:#aaa; font-size:13.2px; cursor:pointer; text-align:left; padding:0; }
    .btn-photo-remove:hover { color:#111111; }
    .pf-field { margin-bottom:18px; }
    .pf-field label { display:block; font-size:15.6px; font-weight:700; color:#333; margin-bottom:8px; }
    .pf-field .pf-hint { font-size:13.2px; font-weight:400; color:#aaa; margin-left:6px; }
    .pf-field input, .pf-field textarea, .pf-field select { width:100%; padding:11px 14px; border:1px solid #e5e5e5; border-radius:8px; font-size:15.6px; font-family:inherit; color:#1a1a1a; box-sizing:border-box; }
    .pf-field textarea { min-height:110px; resize:vertical; line-height:1.6; }
    .pf-char-count { text-align:right; font-size:13.2px; color:#aaa; margin-top:4px; }
    .link-list { display:flex; flex-direction:column; gap:10px; margin-bottom:10px; }
    .link-row { display:grid; grid-template-columns:120px 1fr auto; gap:8px; align-items:center; }
    .link-row input, .link-row select { padding:9px 12px; border:1px solid #e5e5e5; border-radius:8px; font-size:14.4px; }
    .btn-link-remove { background:none; border:none; color:#ccc; font-size:20px; cursor:pointer; padding:4px; line-height:1; }
    .btn-link-remove:hover { color:#111111; }
    .btn-add-link { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:#fff; border:1.5px dashed #ccc; border-radius:8px; font-size:14.4px; font-weight:600; color:#666; cursor:pointer; }
    .btn-add-link:hover { border-color:#111111; color:#111111; }
    .btn-save-profile { width:100%; padding:14px; background:#1a1a1a; color:#fff; border:none; border-radius:10px; font-size:16.8px; font-weight:700; cursor:pointer; margin-top:8px; }
    .btn-save-profile:hover { background:#333; }
    .btn-save-profile:disabled { background:#ccc; cursor:not-allowed; }
    .featured-banner { background:linear-gradient(135deg,#fff8f0,#f5f5f5); border:1px solid #ffd8a8; border-radius:12px; padding:16px 18px; margin-bottom:16px; }
    .featured-banner.active { background:linear-gradient(135deg,#f5f5f5,#eeeeee); border-color:#c5ceff; }
    .featured-banner h4 { font-size:16.8px; font-weight:800; margin-bottom:6px; color:#1a1a1a; }
    .featured-banner p { font-size:14.4px; color:#666; line-height:1.6; margin:0; }
    .settings-divider { border:none; border-top:1px solid #eee; margin:24px 0; }
    .my-avatar.has-photo { background:#eee; padding:0; }
    .my-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .mc-review { padding: 0 16px 14px; border-top: 1px solid #f0f0f0; margin-top: -4px; }
    .mc-review summary { cursor: pointer; font-size: 13.2px; font-weight: 700; color: #333; padding: 12px 0 8px; list-style: none; }
    .mc-review summary::-webkit-details-marker { display: none; }
    .mc-review-stars { display: flex; gap: 4px; margin-bottom: 8px; }
    .mc-review-star { border: none; background: none; font-size: 22px; color: #ddd; cursor: pointer; padding: 0; line-height: 1; }
    .mc-review-star.on { color: #f5a623; }
    .mc-review textarea { width: 100%; min-height: 72px; border: 1px solid #eee; border-radius: 8px; padding: 10px; font-size: 13px; resize: vertical; box-sizing: border-box; }
    .mc-review-btn { margin-top: 8px; width: 100%; padding: 10px; border: none; border-radius: 8px; background: #111; color: #fff; font-weight: 700; cursor: pointer; font-size: 13px; }
    .mc-review-note { font-size: 11.5px; color: #888; margin-top: 6px; line-height: 1.45; }

    /* 공통 */
    .empty-state { text-align:center; padding:48px 0; color:#bbb; }
    .empty-state i { font-size: 48px; display:block; margin-bottom:12px; }
    .empty-state a { color:#111111; font-weight:600; }
    .spinner { width:28px; height:28px; border:3px solid #eee; border-top-color:#111111; border-radius:50%; animation:spin .7s linear infinite; margin:40px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:700px) {
      .mypage-wrap { grid-template-columns:1fr; }
      .my-sidebar { position:static; }
      .proj-card { flex-direction:column; align-items:flex-start; }
      .link-row { grid-template-columns:1fr; }
    }
  </style>
</head>

          </div>
          <div>
            <span id="marketing-status" style="font-size: 15.6px;color:#aaa"></span>
            <button id="btn-marketing-toggle" class="btn-settings-action" onclick="withdrawMarketing()">마케팅 수신 철회</button>

        <div style="font-size: 14.4px;color:#bbb;margin-top:12px;line-height:1.6">
          동의 철회 시 마케팅 수신(이메일·문자·알림톡)이 즉시 중단됩니다. 동의 기록은 법적 근거로 보관됩니다.
        </div>

      <div class="settings-card">
        <div class="settings-label" style="margin-bottom:4px">연결된 계정</div>

<script>
if (!API.isLoggedIn()) { location.href = '/login.html?next=/mypage.html' }
const user = API.user()

const statusLabel = { open:'모집중', matched:'매칭완료', contract:'계약완료', in_progress:'작업중', delivered:'납품완료', completed:'완료', cancelled:'취소' }
const memberTypeLabel = { student:'수강생', client:'의뢰인' }
const roleLabel = { editor:'에디터즈', admin:'관리자' }
const memberType = user.member_type || 'student'

const LINK_PRESETS = ['Instagram', 'YouTube', 'Website', 'Blog', 'Behance', '기타']

let profileData = null
let pendingProfileImage = undefined

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function avatarHtml(profile) {
  const name = profile?.name || user?.name || '?'
  if (profile?.profile_image) {
    return `<div class="my-avatar has-photo"><img src="${profile.profile_image.replace(/"/g, '&quot;')}" alt="" /></div>`
  }
  return `<div class="my-avatar">${name[0] || '?'}</div>`
}

function renderSidebar(profile) {
  const p = profile || profileData || user
  const mt = p.member_type || 'student'
  const roleBadges = `<div class="my-role-badges">${
    p.role === 'admin'
      ? `<span class="my-role admin">${roleLabel.admin}</span>`
      : `${p.role === 'editor' ? `<span class="my-role editor">${roleLabel.editor}</span>` : ''}<span class="my-role ${mt}">${memberTypeLabel[mt] || '수강생'}</span>`
  }</div>`
  const bioBlock = p.bio ? `<div class="my-bio-preview">${escapeHtml(p.bio)}</div>` : ''
  document.getElementById('my-profile').innerHTML = `
    ${avatarHtml(p)}
    <div class="my-name">${escapeHtml(p.name || '')}</div>
    <div class="my-email">${escapeHtml(p.email || '')}</div>
    ${bioBlock}
    ${roleBadges}`
}

renderSidebar(user)

const tabs = [
  { id:'courses',  icon:'ti-book',         label:'내 강의',       always:true },
  { id:'projects', icon:'ti-clipboard',    label:'내 클라이언츠', memberTypes:['client'], roles:['admin'] },
  { id:'quotes',   icon:'ti-file-invoice', label:'내 견적',       roles:['editor','admin'] },
  { id:'editor-profile', icon:'ti-rosette', label:'에디터즈 프로필', roles:['editor','admin'] },
  { id:'coupons',  icon:'ti-ticket',       label:'내 쿠폰',       always:true },
  { id:'settings', icon:'ti-user-circle',  label:'프로필 · 설정', always:true },
]

const visibleTabs = tabs.filter(t => {
  if (t.always) return true
  if (t.memberTypes && t.memberTypes.includes(memberType)) return true
  if (t.roles && t.roles.includes(user.role)) return true
  return false
})

document.getElementById('my-nav').innerHTML = visibleTabs.map(t => `
  <a class="my-nav-item" data-sec="${t.id}" href="#" onclick="showSection('${t.id}');return false">
    <i class="ti ${t.icon}"></i><span>${t.label}</span>
  </a>`).join('')

document.getElementById('my-nav-logout').innerHTML = `
  <a class="my-nav-item my-nav-item--logout" href="#" onclick="API.logout();return false">
    <i class="ti ti-logout"></i><span>로그아웃</span>
  </a>`

let currentSection = ''
function showSection(id) {
  document.querySelectorAll('.my-section').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.my-nav-item[data-sec]').forEach(el => el.classList.remove('active'))
  const sec = document.getElementById('sec-' + id)
  if (sec) sec.classList.add('active')
  const navItem = document.querySelector(`.my-nav-item[data-sec="${id}"]`)
  if (navItem) navItem.classList.add('active')
  currentSection = id
  if (id === 'courses') loadCourses()
  if (id === 'projects') loadProjects()
  if (id === 'quotes') loadQuotes()
  if (id === 'editor-profile') loadEditorProfile()
  if (id === 'coupons') loadCoupons()
  if (id === 'settings') loadSettings()
}

function updatePhotoPreview(src, initial) {
  const el = document.getElementById('profile-photo-preview')
  const rm = document.getElementById('btn-photo-remove')
  if (src) {
    el.innerHTML = `<img src="${src.replace(/"/g, '&quot;')}" alt="" />`
    if (rm) rm.style.display = 'block'
  } else {
    el.textContent = initial || '?'
    if (rm) rm.style.display = 'none'
  }
}

function addLinkRow(label = 'Instagram', url = '') {
  const list = document.getElementById('link-list')
  const rows = list.querySelectorAll('.link-row')
  if (rows.length >= 5) { toast('링크는 최대 5개까지 등록할 수 있습니다.', 'info'); return }
  const opts = LINK_PRESETS.map(p => `<option value="${p}" ${p === label ? 'selected' : ''}>${p}</option>`).join('')
  const row = document.createElement('div')
  row.className = 'link-row'
  row.innerHTML = `
    <select class="link-label">${opts}</select>
    <input type="url" class="link-url" placeholder="https://..." value="${escapeHtml(url)}" />
    <button type="button" class="btn-link-remove" onclick="this.closest('.link-row').remove();updateAddLinkBtn()" title="삭제">×</button>`
  list.appendChild(row)
  updateAddLinkBtn()
}

function updateAddLinkBtn() {
  const btn = document.getElementById('btn-add-link')
  const n = document.querySelectorAll('#link-list .link-row').length
  if (btn) btn.style.display = n >= 5 ? 'none' : 'inline-flex'
}

function collectLinks() {
  return [...document.querySelectorAll('#link-list .link-row')].map(row => ({
    label: row.querySelector('.link-label')?.value || '기타',
    url: row.querySelector('.link-url')?.value.trim() || '',
  })).filter(l => l.url)
}

function resizeProfileImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = () => {
      const img = new Image()
      img.onload = () => {
        const max = 256
        let w = img.width, h = img.height
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max }
          else { w = Math.round(w * max / h); h = max }
        }
        const canvas = document.createElement('canvas')
        canvas.width = w; canvas.height = h
        canvas.getContext('2d').drawImage(img, 0, 0, w, h)
        resolve(canvas.toDataURL('image/jpeg', 0.85))
      }
      img.onerror = () => reject(new Error('이미지를 불러올 수 없습니다.'))
      img.src = reader.result
    }
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'))
    reader.readAsDataURL(file)
  })
}

document.getElementById('profile-photo-input')?.addEventListener('change', async e => {
  const file = e.target.files?.[0]
  if (!file) return
  if (file.size > 2 * 1024 * 1024) { toast('2MB 이하 이미지만 업로드할 수 있습니다.', 'error'); e.target.value = ''; return }
  try {
    pendingProfileImage = await resizeProfileImage(file)
    updatePhotoPreview(pendingProfileImage, document.getElementById('pf-name')?.value?.[0])
  } catch (err) {
    toast(err.message, 'error')
  }
  e.target.value = ''
})

function removeProfilePhoto() {
  pendingProfileImage = null
  updatePhotoPreview(null, document.getElementById('pf-name')?.value?.[0] || user.name?.[0])
}

document.getElementById('pf-bio')?.addEventListener('input', e => {
  document.getElementById('pf-bio-count').textContent = e.target.value.length
})

async function loadSettings() {
  try {
    profileData = await API.get('/my/profile')
    pendingProfileImage = undefined
    document.getElementById('pf-name').value = profileData.name || ''
    document.getElementById('pf-phone').value = profileData.phone || ''
    document.getElementById('pf-bio').value = profileData.bio || ''
    document.getElementById('pf-bio-count').textContent = (profileData.bio || '').length
    updatePhotoPreview(profileData.profile_image, profileData.name?.[0])
    const list = document.getElementById('link-list')
    list.innerHTML = ''
    const links = profileData.social_links?.length ? profileData.social_links : []
    if (links.length) links.forEach(l => addLinkRow(l.label, l.url))
    else addLinkRow()
    updateAddLinkBtn()
    const ms = document.getElementById('marketing-status')
    const mb = document.getElementById('btn-marketing-toggle')
    if (profileData.marketing_agreed) {
      ms.textContent = '동의함 ✅'; mb.style.display = 'inline-block'
    } else {
      ms.textContent = '미동의'; mb.style.display = 'none'
    }
    renderLinkStatus(profileData)
    renderSidebar(profileData)
  } catch (e) {
    toast('프로필을 불러오지 못했습니다.', 'error')
  }
}

function renderLinkStatus(p) {
  const map = [
    ['google', p.google_linked, 'google-link-status', 'btn-google-link-toggle'],
    ['kakao', p.kakao_linked, 'kakao-link-status', 'btn-kakao-link-toggle'],
  ]
  map.forEach(([provider, linked, statusId, btnId]) => {
    const statusEl = document.getElementById(statusId)
    const btn = document.getElementById(btnId)
    if (!statusEl || !btn) return
    if (linked) {
      statusEl.textContent = '연결됨 ✅'
      btn.textContent = '연결 해제'
      btn.dataset.linked = '1'
      // 다른 로그인 수단이 없으면 해제 비활성화
      const otherLinked = provider === 'google' ? p.kakao_linked : p.google_linked
      btn.disabled = !p.has_password && !otherLinked
    } else {
      statusEl.textContent = '연결 안 됨'
      btn.textContent = '연결하기'
      btn.dataset.linked = '0'
      btn.disabled = false
    }
  })
}

async function toggleSocialLink(provider) {
  const btn = document.getElementById(provider === 'google' ? 'btn-google-link-toggle' : 'btn-kakao-link-toggle')
  if (btn?.dataset.linked === '1') {
    // 연결 해제
    if (!confirm(`${provider === 'google' ? 'Google' : '카카오'} 연결을 해제할까요?`)) return
    try {
      const res = await API.post('/my/unlink/' + provider, {})
      renderLinkStatus(res.user)
      toast('연결을 해제했습니다.', 'success')
    } catch (e) {
      toast(e.message || '해제 중 오류가 발생했습니다.', 'error')
    }
    return
  }
  // 연결하기: 단기 토큰 발급 후 OAuth 왕복
  try {
    const { link_token } = await API.get('/auth/link-token')
    const builder = provider === 'google' ? buildGoogleAuthUrl : buildKakaoAuthUrl
    location.href = builder('/mypage.html', null, 'link', link_token)
  } catch (e) {
    toast(e.message || '연동을 시작하지 못했습니다.', 'error')
  }
}

// 연동 결과 토스트 (콜백 리다이렉트 파라미터)
;(function handleLinkResult() {
  const sp = new URLSearchParams(location.search)
  if (sp.get('link_success')) {
    const p = sp.get('link_success')
    toast(`${p === 'google' ? 'Google' : '카카오'} 계정을 연결했습니다.`, 'success')
    history.replaceState(null, '', location.pathname)
  } else if (sp.get('link_error')) {
    toast(decodeURIComponent(sp.get('link_error')), 'error')
    history.replaceState(null, '', location.pathname)
  }
})()

async function saveProfile() {
  const btn = document.getElementById('btn-save-profile')
  btn.disabled = true; btn.textContent = '저장 중...'
  try {
    const body = {
      name: document.getElementById('pf-name').value.trim(),
      phone: document.getElementById('pf-phone').value.trim(),
      bio: document.getElementById('pf-bio').value.trim(),
      social_links: collectLinks(),
    }
    if (pendingProfileImage !== undefined) body.profile_image = pendingProfileImage
    const res = await API.patch('/my/profile', body)
    profileData = res.user
    pendingProfileImage = undefined
    if (typeof invalidatePhoneCache === 'function') invalidatePhoneCache()
    const stored = { ...API.user(), ...userPayloadFromProfile(res.user), phone: res.user.phone }
    localStorage.setItem('tc_user', JSON.stringify(stored))
    renderSidebar(profileData)
    toast('프로필이 저장되었습니다.', 'success')
  } catch (e) {
    toast(e.message, 'error')
  } finally {
    btn.disabled = false; btn.textContent = '프로필 저장'
  }
}

function userPayloadFromProfile(p) {
  return { name: p.name, phone: p.phone, bio: p.bio, profile_image: p.profile_image, social_links: p.social_links, member_type: p.member_type, role: p.role }
}

async function initProfile() {
  try {
    profileData = await API.get('/my/profile')
    renderSidebar(profileData)
  } catch {}
}

initProfile()

// 초기 탭
const initTab = new URLSearchParams(location.search).get('tab') || visibleTabs[0]?.id
showSection(typeof initTab === 'string' ? initTab : initTab.id)

// ── 내 강의 ──
function renderCourseThumbBadge(c) {
  if (c.course_type === 'live') {
    return `<span class="mc-live-badge mc-thumb-badge">${googleMeetIconHtml(28)}<span class="badge-meet-label">Meet</span></span>`
  }
  if (c.course_type === 'offline' || c.is_offline) {
    return '<span class="mc-type-badge mc-thumb-badge mc-type-badge--offline">OFFLINE</span>'
  }
  if (c.course_type === 'streaming') {
    return '<span class="mc-type-badge mc-thumb-badge mc-type-badge--stream">STREAM</span>'
  }
  const promo = String(c.badge || '').trim().toLowerCase()
  if (promo === 'new' || promo === 'best' || promo === 'free') {
    return `<span class="mc-promo-badge mc-thumb-badge mc-promo-badge--${promo}">${String(c.badge).toUpperCase()}</span>`
  }
  return '<span class="mc-type-badge mc-thumb-badge mc-type-badge--vod">VOD</span>'
}

function renderCourseThumbInner(c, defaultIcon = 'ti-video') {
  const thumbImg = c.thumbnail_url || c.thumbnail_image
  if (thumbImg) {
    return `<img src="${escapeHtml(thumbImg)}" alt="" />`
  }
  return `<i class="ti ${escapeHtml(c.thumbnail_icon || defaultIcon)}"></i>`
}

function renderLiveCourseCard(c) {
  const LS = window.LiveSession
  const start = LS ? LS.parseLiveStart(c) : null
  const meetPayload = encodeURIComponent(JSON.stringify({
    meet_code: c.meet_code,
    live_status: c.live_status,
    live_starts_at: c.live_starts_at,
    live_schedule: c.live_schedule,
  }))
  const meetBtn = (c.live_resources?.live_ended || c.live_status === 'ended')
    ? `<span class="btn-meet btn-meet--waiting">라이브 종료</span>`
    : (LS ? LS.meetButtonHtml(c, start, true) : '')
  const materialBtn = LS ? LS.materialButtonHtml(c) : ''
  const replayExtras = LS ? LS.liveResourceButtonsHtml(c, { includeMaterial: false, enrolled: true }) : ''
  return `<div class="my-course-card my-course-card--live my-course-card--wrap">
    <a href="/course.html?slug=${escapeHtml(c.slug)}" class="mc-link">
    <div class="mc-thumb ${c.thumb_style==='dark'?'thumb-dark':'thumb-light'}">
      ${renderCourseThumbBadge(c)}
      ${renderCourseThumbInner(c, 'ti-broadcast')}
    </div>
    <div class="mc-body">
      <div class="mc-cat">${escapeHtml(c.category)}</div>
      <div class="mc-title">${escapeHtml(c.title)}</div>
      ${c.live_schedule ? `<div class="mc-meta" style="color:#555555;margin-bottom:4px"><i class="ti ti-calendar"></i> ${escapeHtml(c.live_schedule)}</div>` : ''}
      ${materialBtn}
      <div data-live-meet-wrap data-live-course="${meetPayload}">${meetBtn}</div>
    </div>
    </a>
    ${replayExtras ? `<div class="mc-actions mc-actions--live">${replayExtras}</div>` : ''}
    ${renderCancelAction(c)}
  </div>`
}

function renderCancelAction(c) {
  if (c.can_cancel === false) {
    return c.cancel_hint ? `<div class="mc-cancel-hint">${escapeHtml(c.cancel_hint)}</div>` : ''
  }
  const label = c.cancel_label || (c.paid_amount > 0 ? '환불 신청' : '신청 취소')
  const refundNote = c.paid_amount > 0 && c.refund_preview > 0
    ? `<div class="mc-cancel-hint">예상 환불액 ₩${Number(c.refund_preview).toLocaleString()}</div>`
    : ''
  return `${refundNote}<div class="mc-actions"><button type="button" class="mc-cancel-btn" onclick="cancelEnrollment('${c.id}')">${label}</button></div>`
}

async function cancelEnrollment(courseId) {
  let preview
  try {
    preview = await API.get('/my/courses/' + courseId + '/cancel-preview')
  } catch (e) {
    toast(e.message || '취소 정보를 불러오지 못했습니다.', 'error')
    return
  }
  if (!preview.allowed) {
    toast(preview.message || '취소·환불할 수 없습니다.', 'error')
    return
  }
  const courseTitle = preview.course_title || '강의'
  const isRefund = preview.type === 'refund'
  const refundLine = isRefund && preview.refund_amount > 0
    ? `\n예상 환불액: ₩${Number(preview.refund_amount).toLocaleString()}`
    : ''
  const msg = `${courseTitle}\n\n${isRefund ? '환불' : '수강 신청 취소'}를 진행할까요?${refundLine}\n\n· 작성한 기대평이 삭제됩니다.\n· 발급된 기대평·후기 할인 쿠폰이 회수됩니다.\n· 수강 진도가 초기화됩니다.`
  if (!confirm(msg)) return
  try {
    const res = await API.post('/my/courses/' + courseId + '/cancel', {})
    let done = isRefund ? '환불 처리되었습니다.' : '수강 신청이 취소되었습니다.'
    if (res.refund_amount > 0) done += ` (₩${Number(res.refund_amount).toLocaleString()})`
    if (res.anticipation_deleted) done += ' 기대평이 삭제되었습니다.'
    if (res.coupons_recalled) done += ' 쿠폰이 회수되었습니다.'
    toast(done, 'success')
    document.getElementById('my-courses').dataset.loaded = ''
    loadCourses()
  } catch (e) {
    toast(e.message || '처리 중 오류가 발생했습니다.', 'error')
  }
}

function renderCourseReviewBlock(c) {
  if (c.course_type === 'live') return ''
  const rating = c.my_review?.rating || 0
  const content = escapeHtml(c.my_review?.content || '')
  const stars = [1, 2, 3, 4, 5].map(n =>
    `<button type="button" class="mc-review-star ${n <= rating ? 'on' : ''}" data-star="${n}" onclick="setReviewStar('${c.id}', ${n})">★</button>`
  ).join('')
  const doneNote = c.my_review?.rating === 5
    ? '<div class="mc-review-note">5점 후기가 저장되었습니다.</div>'
    : ''
  return `<details class="mc-review">
    <summary>${c.my_review ? '수강 후기 수정' : '수강 후기 작성'}</summary>
    <div class="mc-review-stars" id="review-stars-${c.id}">${stars}</div>
    <textarea id="review-content-${c.id}" placeholder="수강 후기를 남겨주세요.">${content}</textarea>
    ${doneNote}
    <button type="button" class="mc-review-btn" onclick="submitCourseReview('${c.id}')">후기 저장</button>
  </details>`
}

const reviewRatings = {}

function setReviewStar(courseId, rating) {
  reviewRatings[courseId] = rating
  const wrap = document.getElementById('review-stars-' + courseId)
  if (!wrap) return
  wrap.querySelectorAll('.mc-review-star').forEach(btn => {
    btn.classList.toggle('on', Number(btn.dataset.star) <= rating)
  })
}

async function submitCourseReview(courseId) {
  const stars = document.getElementById('review-stars-' + courseId)
  const active = stars?.querySelectorAll('.mc-review-star.on').length || reviewRatings[courseId] || 0
  const rating = reviewRatings[courseId] || active
  if (!rating) {
    toast('별점을 선택해주세요.', 'error')
    return
  }
  const content = document.getElementById('review-content-' + courseId)?.value?.trim() || ''
  try {
    const res = await API.post('/my/reviews', { course_id: courseId, rating, content })
    toast('후기가 저장되었습니다.', 'success')
    document.getElementById('my-courses').dataset.loaded = ''
    loadCourses()
  } catch (e) {
    toast(e.message || '후기 저장 중 오류가 발생했습니다.', 'error')
  }
}

async function loadCourses() {
  const el = document.getElementById('my-courses')
  if (el.dataset.loaded) return
  try {
    const courses = await API.get('/my/courses')
    el.dataset.loaded = '1'
    courses.forEach(c => {
      if (c.my_review?.rating) reviewRatings[c.id] = c.my_review.rating
    })
    if (!courses.length) {
      el.innerHTML = `<div class="empty-state"><i class="ti ti-book-off"></i><p>아직 수강 중인 강의가 없습니다.<br><a href="/">강의 둘러보기 →</a></p></div>`
      return
    }
    el.innerHTML = `<div class="my-course-grid">${courses.map(c => {
      if (c.course_type === 'live') return renderLiveCourseCard(c)
      const pct = c.total_chapters > 0 ? Math.round((c.completed_chapters / c.total_chapters) * 100) : 0
      return `<div class="my-course-card my-course-card--wrap">
        <a href="/player.html?slug=${c.slug}&chapter=${c.last_chapter_id || 'first'}" class="mc-link">
        <div class="mc-thumb ${c.thumb_style==='dark'?'thumb-dark':'thumb-light'}">
          ${renderCourseThumbBadge(c)}
          ${renderCourseThumbInner(c)}
          ${pct === 100 ? '<div class="mc-done"><i class="ti ti-check"></i> 완료</div>' : ''}
        </div>
        <div class="mc-body">
          <div class="mc-cat">${escapeHtml(c.category)}</div>
          <div class="mc-title">${escapeHtml(c.title)}</div>
          <div class="mc-progress-row">
            <div class="mc-bar-wrap"><div class="mc-bar" style="width:${pct}%"></div></div>
            <span class="mc-pct">${pct}%</span>
          </div>
          <div class="mc-meta">${c.completed_chapters}/${c.total_chapters}강 완료</div>
        </div>
        </a>
        ${renderCourseReviewBlock(c)}
        ${renderCancelAction(c)}
      </div>`
    }).join('')}</div>`
    if (window.LiveSession) LiveSession.startCountdownTicker()
  } catch(e) {
    el.innerHTML = '<p style="color:#aaa;text-align:center">강의를 불러오지 못했습니다.</p>'
  }
}

const EDITOR_LOCATIONS = ['서울','경기','인천','부산','대구','광주','대전','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주','해외·원격']
const WORK_TYPE_LABELS = { remote:'원격·재택', hybrid:'하이브리드', onsite:'현장 근무', project:'프로젝트 단위', fulltime:'풀타임·장기' }

async function loadEditorProfile() {
  const wrap = document.getElementById('editor-profile-wrap')
  if (wrap.dataset.loaded) return
  try {
    const app = await API.get('/editor/my-application')
    if (!app || app.status !== 'approved') {
      wrap.innerHTML = `<div class="empty-state"><i class="ti ti-rosette"></i><p>승인된 에디터즈만 이용할 수 있습니다.<br><a href="/editor-program.html" style="color:#111111;font-weight:700">에디터즈 신청하기 →</a></p></div>`
      wrap.dataset.loaded = '1'
      return
    }
    const featuredActive = app.is_featured
    const untilStr = app.featured_until ? app.featured_until.slice(0, 10) : ''
    const locOpts = EDITOR_LOCATIONS.map(l => `<option value="${l}" ${app.location === l ? 'selected' : ''}>${l}</option>`).join('')
    const wtOpts = (app.work_type_options || Object.entries(WORK_TYPE_LABELS).map(([value, label]) => ({ value, label })))
      .map(o => `<option value="${o.value}" ${app.work_type === o.value ? 'selected' : ''}>${o.label}</option>`).join('')
    wrap.innerHTML = `
      <div class="featured-banner ${featuredActive ? 'active' : ''}">
        <h4>${featuredActive ? '⭐ 명단 상단 노출 중' : '상위노출 쿠폰'}</h4>
        <p>${featuredActive
          ? `~ ${untilStr}까지 에디터즈 목록 상단에 노출됩니다.`
          : '승격(승인) 시 1주일 상위노출이 적용되고, 수강생은 상위노출 쿠폰 2만원×5장이 발급됩니다.'}</p>
      </div>
      <div class="profile-form-card">
        <div class="pf-field">
          <label>활동 지역</label>
          <select id="ed-location"><option value="">선택</option>${locOpts}</select>
        </div>
        <div class="pf-field">
          <label>희망 근무 형태</label>
          <select id="ed-work-type"><option value="">선택</option>${wtOpts}</select>
        </div>
        <div class="pf-field">
          <label>에디터 소개 <span class="pf-hint">에디터즈 목록에 표시</span></label>
          <textarea id="ed-intro" maxlength="1000">${escapeHtml(app.intro || '')}</textarea>
        </div>
        <div class="pf-field">
          <label>포트폴리오 링크</label>
          <input type="url" id="ed-portfolio" value="${escapeHtml(app.portfolio_url || '')}" placeholder="https://..." />
        </div>
        <button type="button" class="btn-save-profile" onclick="saveEditorProfile()">에디터즈 프로필 저장</button>
      </div>`
    wrap.dataset.loaded = '1'
  } catch(e) {
    wrap.innerHTML = '<p style="color:#aaa;text-align:center">에디터즈 프로필을 불러오지 못했습니다.</p>'
  }
}

async function saveEditorProfile() {
  const location = document.getElementById('ed-location')?.value
  const work_type = document.getElementById('ed-work-type')?.value
  const intro = document.getElementById('ed-intro')?.value.trim()
  const portfolio_url = document.getElementById('ed-portfolio')?.value.trim()
  if (!location) return alert('활동 지역을 선택해주세요.')
  if (!work_type) return alert('희망 근무 형태를 선택해주세요.')
  try {
    await API.patch('/editor/profile', { location, work_type, intro, portfolio_url: portfolio_url || null })
    alert('에디터즈 프로필이 저장되었습니다.')
    const wrap = document.getElementById('editor-profile-wrap')
    delete wrap.dataset.loaded
    loadEditorProfile()
  } catch(e) {
    alert(e.message || '저장 중 오류가 발생했습니다.')
  }
}

      const issuance = c.issuance || {}

            issuance.source,

            issuance.benefit || '',
            issuance.course_title ? `대상 강의: ${issuance.course_title}` : '',

        ? '에디터즈 승인 혜택 · 명단 상단 노출'

      const useBtn = isFeatured && c.status === 'available'

      const themeClass = c.reason === 'anticipation_review' ? 'coupon-ticket--anticipation'

        : c.reason === 'client_course_reward' ? 'coupon-ticket--client-reward'

    }).join('')}</div>`
  } catch(e) {
    el.innerHTML = '<p style="color:#aaa;text-align:center">쿠폰 정보를 불러오지 못했습니다.</p>'
  }
}

async function useFeaturedCoupon(couponId) {
  if (!confirm('상위노출 쿠폰을 사용하시겠습니까? 7일간 에디터즈 목록 상단에 노출됩니다.')) return
  try {
    await API.post('/editor/featured-coupon', { coupon_id: couponId })
    alert('상위노출이 적용되었습니다.')
    const el = document.getElementById('my-coupons')
    delete el.dataset.loaded
    loadCoupons()
    const wrap = document.getElementById('editor-profile-wrap')
    if (wrap) { delete wrap.dataset.loaded; loadEditorProfile() }
  } catch(e) {
    alert(e.message || '쿠폰 사용 중 오류가 발생했습니다.')
  }
}

// ── 마케팅 철회 ──
async function withdrawMarketing() {
  if (!confirm('마케팅 정보 수신 동의를 철회하시겠습니까?')) return
  try {
    await API.del('/my/marketing-consent')
    alert('마케팅 수신 동의가 철회되었습니다.')
    document.getElementById('btn-marketing-toggle').style.display = 'none'
    document.getElementById('marketing-status').textContent = '철회 완료'
  } catch(e) {
    alert('처리 중 오류가 발생했습니다.')
  }
}
</script>
