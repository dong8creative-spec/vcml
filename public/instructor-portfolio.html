<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->

  <script>

    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-13X3J2EYQ2');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강사 포트폴리오 — 타닥클래스</title>
  <meta name="description" content="도각쌤이 직접 만든 유튜브 쇼츠, 인스타그램, 샤오홍슈 포트폴리오" />
  <link rel="stylesheet" href="/css/style.css?v=16" />
  <link rel="stylesheet" href="/css/instructor-portfolio.css?v=20" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />
</head>
<body class="portfolio-page">

<div data-site-header></div>

<main>
  <header class="portfolio-hero">
    <p class="portfolio-hero-eyebrow">Portfolio</p>
    <h1 class="portfolio-hero-title">강사 포트폴리오</h1>
    <p class="portfolio-hero-subtitle">도각쌤이 직접 만든 숏폼 · 릴스 · 샤오홍슈</p>
    <p class="portfolio-hero-lead">플랫폼별 포트폴리오를 둘러보고, 작업 사례를 확인해 보세요</p>
  </header>

  <div class="portfolio-main">
    <section class="portfolio-card portfolio-profile" aria-label="강사 요약">
      <div class="portfolio-profile__meta">
        <h2 class="portfolio-profile__name">도각쌤 / 이동헌</h2>
        <p class="portfolio-profile__role">세상에서 가장 빠른 영상편집기사가 될래요</p>
        <div class="portfolio-profile__tags">
          <span>캡컷</span>
          <span>다빈치 리졸브</span>
          <span>숏폼</span>
        </div>
      </div>
      <div class="portfolio-profile__actions">
        <a href="/instructors.html" class="portfolio-btn portfolio-btn--ghost">강사 소개</a>
        <a href="/instructor-portfolio-quote.html" class="portfolio-btn portfolio-btn--primary">
          <i class="ti ti-calculator" aria-hidden="true"></i> 선택형 견적서
        </a>
      </div>
    </section>

    <section class="portfolio-card" aria-labelledby="portfolio-works-title">
      <p class="portfolio-section-eyebrow">Portfolio</p>
      <h2 class="portfolio-section-title" id="portfolio-works-title">포트폴리오</h2>
      <p class="portfolio-section-desc">플랫폼을 선택해 보세요. 채널·계정은 핵심 성과 한 줄로, 쇼츠·샤오홍슈는 작업 목록으로 확인할 수 있습니다.</p>

      <div class="portfolio-filter" role="tablist" aria-label="플랫폼 필터">
        <button type="button" class="portfolio-filter__btn active" role="tab" aria-selected="true" data-platform="youtube">유튜브</button>
        <button type="button" class="portfolio-filter__btn" role="tab" aria-selected="false" data-platform="instagram">인스타그램</button>
        <button type="button" class="portfolio-filter__btn" role="tab" aria-selected="false" data-platform="rednote">샤오홍슈</button>
      </div>

      <div id="panel-youtube" class="portfolio-panel" role="tabpanel" data-platform="youtube"></div>
      <div id="panel-instagram" class="portfolio-panel" role="tabpanel" data-platform="instagram" hidden></div>
      <div id="panel-rednote" class="portfolio-panel" role="tabpanel" data-platform="rednote" hidden></div>
    </section>
  </div>
</main>

<div data-chrome="footer"></div>

<script src="/js/api.js?v=3"></script>
<script src="/js/site-layout.js"></script>
<script src="/js/site-header.js?v=12"></script>
<script src="/js/site-chrome.js"></script>
<script src="/js/instructor-portfolio.js?v=22"></script>
</body>
</html>
