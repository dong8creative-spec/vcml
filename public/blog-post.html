  <title>블로그 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=16" />

  <style>
    .post-wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
    .post-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); margin-bottom: 28px; text-decoration: none; }
    .post-back:hover { color: var(--primary); }
    .post-title { font-size: 28px; font-weight: 900; color: var(--text-primary); margin-bottom: 10px; line-height: 1.35; }
    .post-meta { font-size: 13px; color: var(--text-hint); padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .post-cover { width: 100%; border-radius: 12px; margin-bottom: 28px; }
    .post-body { font-size: 16px; line-height: 1.85; color: var(--text-secondary); white-space: pre-line; }
    .post-nav { display: flex; gap: 12px; margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); }
    .post-nav a { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text-secondary); text-decoration: none; text-align: center; }
    .post-nav a:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body data-legal-page="blog">

<div data-site-header></div>

<div class="post-wrap" id="post-wrap"><div class="spinner"></div></div>

<div data-chrome="footer"></div>
<script src="/js/api.js?v=3"></script>
<script src="/js/site-layout.js"></script>
<script src="/js/site-header.js?v=12"></script>
<script src="/js/site-chrome.js"></script>
<script src="/js/legal-page.js"></script>
</body>
