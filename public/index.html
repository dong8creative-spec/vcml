// 강의 카드 HTML 생성
function courseCard(c) {
  const isLive = c.course_type === 'live'
  const isFree = isLive || c.sale_price === 0
  const rating = parseFloat(c.rating) || 0
  const reviewCount = Number(c.review_count) || 0
  const stars = reviewCount > 0
    ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating))
    : ''
  const liveStatusMap = { upcoming: '신청 가능', live: '진행 중', ended: '종료' }
  const thumbImg = c.thumbnail_url || c.thumbnail_image
  const thumbInner = thumbImg
    ? `<img src="${thumbImg.replace(/"/g, '&quot;')}" alt="" />`
    : `<i class="ti ${c.thumbnail_icon || 'ti-video'}"></i>`
  return `
  <a href="/course.html?slug=${c.slug}" class="ccard${CourseEnrollmentUI.catalogCardPanelClass(c)}">
    ${CourseEnrollmentUI.catalogCardPanelOpen(c)}
    <div class="ccard-thumb ${c.thumb_style === 'dark' ? 'td' : 'tl'}">
      ${isLive ? googleMeetBadgeHtml('badge-live') : (c.badge ? `<span class="badge-${String(c.badge).toLowerCase()}">${c.badge}</span>` : '')}
      ${thumbInner}
    </div>
    <div class="ccard-body">
      ${CourseEnrollmentUI.catRowHtml(c, 'ccard-cat')}
      <div class="ccard-title">${c.title}</div>
      ${isLive
        ? `<div class="ccard-schedule"><i class="ti ti-calendar"></i> ${c.live_schedule || '일정 공지 예정'}</div>`
        : (reviewCount > 0
            ? `<div class="ccard-rating"><span class="ccard-stars">${stars}</span><span class="ccard-rnum">${rating} (${reviewCount.toLocaleString()})</span></div>`
            : `<div class="ccard-rating"><span class="ccard-rnum" style="color:#aaa;font-size:13px">후기 없음</span></div>`)}
      <div class="ccard-price-row">
        ${isLive || (c.enrollment_has_limit && c.enrollment_full)
          ? CourseEnrollmentUI.cardEnrollBtnHtml(c, liveStatusMap)
          : (isFree
              ? `<span class="price-free">무료</span>`
              : `${c.price !== c.sale_price ? `<span class="price-ori">₩${Number(c.price).toLocaleString()}</span>` : ''}
                 <span class="price-sale">₩${Number(c.sale_price).toLocaleString()}</span>
                 ${c.price !== c.sale_price ? `<span class="disc-badge">${Math.round((1 - c.sale_price / c.price) * 100)}%</span>` : ''}`)}
      </div>
    </div>
    ${CourseEnrollmentUI.catalogCardPanelClose(c)}
  </a>`
}

function freeCourseCard(c) {
  const isLive = c.course_type === 'live'
  const isFree = isLive || c.sale_price === 0
  const rating = parseFloat(c.rating) || 0
  const reviewCount = Number(c.review_count) || 0
  const stars = reviewCount > 0
    ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating))
    : ''
  const liveStatusMap = { upcoming: '신청 가능', live: '진행 중', ended: '종료' }
  const thumbImg = c.thumbnail_url || c.thumbnail_image
  const thumbInner = thumbImg
    ? `<img src="${thumbImg.replace(/"/g, '&quot;')}" alt="" />`
    : `<i class="ti ${c.thumbnail_icon || 'ti-video'}"></i>`
  return `
  <a href="/course.html?slug=${c.slug}" class="fcard${CourseEnrollmentUI.catalogCardPanelClass(c)}">
    ${CourseEnrollmentUI.catalogCardPanelOpen(c)}
    <div class="fcard-thumb ${c.thumb_style === 'dark' ? 'td' : 'tl'}">
      ${isLive ? googleMeetBadgeHtml('badge-live') : (c.badge ? `<span class="badge-${String(c.badge).toLowerCase()}">${c.badge}</span>` : '')}
      ${thumbInner}
    </div>
    <div class="fcard-body">
      ${CourseEnrollmentUI.catRowHtml(c, 'fcard-cat')}
      <div class="fcard-title">${c.title}</div>
      ${isLive
        ? `<div class="fcard-schedule"><i class="ti ti-calendar"></i> ${c.live_schedule || '일정 공지 예정'}</div>`
        : (reviewCount > 0
            ? `<div class="fcard-rating"><span class="fcard-stars">${stars}</span><span class="fcard-rnum">${rating} (${reviewCount.toLocaleString()})</span></div>`
            : `<div class="fcard-rating"><span class="fcard-rnum fcard-rnum--muted">후기 없음</span></div>`)}
      <div class="fcard-foot fcard-foot--btn">
        ${CourseEnrollmentUI.cardEnrollBtnHtml(c, liveStatusMap)}
      </div>
    </div>
    ${CourseEnrollmentUI.catalogCardPanelClose(c)}
  </a>`
}

// 강의 정렬 · 카테고리 필터 — home-nav.js에서 로드됨

function renderCourseGrid332(courses) {
  const ordered = orderCourses(courses)
  if (!ordered.length) {
    return '<p class="empty">해당 카테고리 강의가 없습니다.</p>'
  }
  const rows = []
  for (let i = 0; i < ordered.length; i += 3) {
    rows.push(ordered.slice(i, i + 3))
  }
  return rows.map((row, i) => {
    const isLast = i === rows.length - 1 && row.length === 2
    return `<div class="course-grid-row${isLast ? ' course-grid-row-last' : ''}">${row.map(courseCard).join('')}</div>`
  }).join('')
}

async function loadAll() {
  try {
    const courses = await API.get('/courses')
    const published = courses.filter(c => c.is_published !== false)
    allPublishedCourses = published
    const live = published.filter(c => c.course_type === 'live')
    const free = published.filter(c => c.course_type !== 'live' && c.sale_price === 0)
    const all = orderCourses(published)

    if (isHomeSectionEnabled('all_courses')) {
      updateCourseGrid(filterCourses())
    }
    if (isHomeSectionEnabled('free_courses')) {
      document.getElementById('shelf-free').innerHTML = [...free, ...live].slice(0, 8).map(freeCourseCard).join('') || '<p class="empty">무료 강의가 없습니다.</p>'
    }
    if (isHomeSectionEnabled('new_courses')) {
      const newest = [...published].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''))
      document.getElementById('shelf-new').innerHTML = newest.map(courseCard).join('') || '<p class="empty">강의가 없습니다.</p>'
    }

    if (isHomeSectionEnabled('purchase_ticker')) loadPurchaseTicker()
    if (isHomeSectionEnabled('reviews')) loadLiveReviews()
  } catch(e) {
    console.error(e)
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}

function syncHeroKnockoutBackground(heroSection, imageUrl) {
  if (!heroSection) return
  const value = imageUrl
    ? `url("${String(imageUrl).replace(/"/g, '%22').replace(/'/g, '%27')}")`
    : 'linear-gradient(150deg, var(--dark-bg, #111) 0%, #1e1e1e 60%, #2a2a2a 100%)'
  heroSection.style.setProperty('--hero-knockout-bg-image', value)
}

function applyHeroButton(el, cfg, slot) {
  if (!el || !cfg) return
  const resolved = typeof resolveHeroButton === 'function'
    ? resolveHeroButton(cfg)
    : cfg
  const label = String(resolved.label || resolved.defaultLabel || '').trim()
  el.href = resolved.href || (slot === 'primary' ? '#all' : '#')
  el.classList.remove('btn-hero-primary', 'btn-hero-knockout', 'btn-hero-ghost')

  const isKnockout = cfg.style === 'knockout'
    || cfg.action === 'instructors'
    || /instructors\.html/i.test(String(resolved.href || ''))
    || label === '강사 소개'
  const isGhost = cfg.style === 'ghost' || (!isKnockout && slot === 'secondary')

  if (isKnockout) {
    el.classList.add('btn-hero-knockout')
    el.innerHTML = `<span class="btn-hero-knockout__label">${escHtml(label)}</span>`
    return
  }
  if (isGhost) {
    el.classList.add('btn-hero-ghost')
    const icon = cfg.show_icon !== false && slot === 'secondary'
      ? '<i class="ti ti-player-play-filled"></i>'
      : ''
    el.innerHTML = `${icon}<span class="btn-hero-ghost__label">${escHtml(label)}</span>`
    return
  }
  el.classList.add('btn-hero-primary')
  el.innerHTML = `<span class="btn-hero-ghost__label">${escHtml(label)}</span>`
}

async function loadHero() {
  try {
    const h = await API.get('/hero')
    const badge = document.getElementById('hero-badge')
    if (badge) badge.innerHTML = `<i class="ti ti-star-filled"></i> ${escHtml(h.badge_text)}`
    const title = document.getElementById('hero-title')
    if (title) title.innerHTML = `${escHtml(h.title)}<br><em id="hero-title-em">${escHtml(h.title_emphasis)}</em>`
    const sub = document.getElementById('hero-subtitle')
    if (sub) sub.innerHTML = escHtml(h.subtitle).replace(/\n/g, '<br>')

    const heroSection = document.querySelector('.hero')
    const heroBg = document.getElementById('hero-bg')
    if (heroSection && heroBg) {
      if (h.image) {
        heroBg.style.backgroundImage = `url("${h.image}")`
        heroSection.classList.add('hero--has-image')
        syncHeroKnockoutBackground(heroSection, h.image)
        if (h.image_alt) heroSection.setAttribute('aria-label', h.image_alt)
        else heroSection.removeAttribute('aria-label')
      } else {
        heroBg.style.backgroundImage = ''
        heroSection.classList.remove('hero--has-image')
        syncHeroKnockoutBackground(heroSection, null)
        heroSection.removeAttribute('aria-label')
      }
    }

    applyHeroButton(document.getElementById('hero-primary-btn'), h.primary_btn, 'primary')
    applyHeroButton(document.getElementById('hero-secondary-btn'), h.secondary_btn, 'secondary')
  } catch (e) {
    console.error(e)
  }
}

async function loadPurchaseTicker() {
  const section = document.getElementById('ticker-section')
  const inner = document.getElementById('ticker-inner')
  if (!section || !inner || !isHomeSectionEnabled('purchase_ticker')) {
    if (section) section.style.display = 'none'
    return
  }
  try {
    const data = await API.get('/recent-orders')
    const orders = data.orders || []
    if (!orders.length) {
      section.style.display = 'none'
      return
    }
    const tickerItems = orders.map(o =>
      `<span class="ticker-item"><span class="ticker-user">${o.user_name}</span>님이 <strong>${o.course_title}</strong>을(를) 구매했습니다.</span>`
    )
    inner.innerHTML = [...tickerItems, ...tickerItems].join('')
    section.style.display = ''
  } catch (e) {
    console.error(e)
    section.style.display = 'none'
  }
}

function interleaveReviews(reviews) {
  const buckets = { student: [], client: [], editor: [] }
  reviews.forEach(r => { if (buckets[r.review_type]) buckets[r.review_type].push(r) })
  const order = ['student', 'client', 'editor'].filter(t => buckets[t].length)
  const out = []
  let i = 0
  while (out.length < reviews.length) {
    const t = order[i % order.length]
    const item = buckets[t].shift()
    if (item) out.push(item)
    i++
  }
  return out
}

function renderReviewCard(r) {
  const stars = '★'.repeat(r.rating || 5) + '☆'.repeat(5 - (r.rating || 5))
  return `<div class="review-card">
    <span class="rc-type ${r.review_type}">${r.type_label}</span>
    <div class="rc-stars">${stars}</div>
    <div class="rc-text">${r.content}</div>
    <div class="rc-footer">
      <div class="rc-dot ${r.review_type === 'student' ? '' : r.review_type}">${r.author_initial || '?'}</div>
      <div>
        <div class="rc-name">${r.author_name}</div>
        <div class="rc-course">${r.context_label}</div>
      </div>
    </div>
  </div>`
}

function reviewSubtitle(visibleTypes, isLoggedIn) {
  const labels = visibleTypes.map(t => t.label)
  if (labels.length >= 3) return labels.join(' · ') + ' — 회원 유형별 후기가 함께 표시됩니다'
  if (labels.length === 2) return labels.join(' · ') + ' — 로그인 회원에게 맞춰 표시됩니다'
  if (!isLoggedIn) return '수강생 후기가 공개됩니다 · 의뢰인·에디터즈 후기는 해당 회원 로그인 시 확인 가능'
  return '수강생 후기 — 의뢰인·에디터즈 후기는 해당 회원 유형 로그인 시 표시됩니다'
}

async function loadLiveReviews() {
  const grid = document.getElementById('review-grid')
  const sub = document.getElementById('review-sub')
  if (!grid) return
  try {
    const data = await API.get('/reviews/live')
    const mixed = interleaveReviews(data.reviews || [])
    const customSub = (typeof getHomepageLayout === 'function' && getHomepageLayout()?.copy?.reviews?.subtitle) || ''
    if (sub) sub.textContent = customSub || reviewSubtitle(data.visible_types || [], API.isLoggedIn())
    if (!mixed.length) {
      grid.innerHTML = '<p class="empty">표시할 후기가 없습니다.</p>'
      return
    }
    grid.innerHTML = mixed.map(renderReviewCard).join('')
  } catch (e) {
    console.error(e)
    grid.innerHTML = '<p class="empty">후기를 불러오지 못했습니다.</p>'
  }
}

function scroll_shelf(id, dir) {
  const el = document.getElementById('shelf-' + id)
  if (!el) return
  const step = id === 'free' ? (el.querySelector('.fcard')?.offsetWidth || 640) + 16 : 320
  el.scrollBy({ left: dir * step, behavior: 'smooth' })
}

// Nav auth — site-header.js에서 처리

initFromUrl()
applyHomepageLayout().then(() => {
  loadHero()
  loadAll()
  initCategoryTiles()
  initGnbCatLinks()
  initSearch()
})
</script>
