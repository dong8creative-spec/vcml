<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의 상세 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=6" /><link rel="stylesheet" href="/css/common.css" /><link rel="stylesheet" href="/css/course.css?v=14" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>
<body>
  <div data-site-header></div>

  <div id="course-wrap"><div class="spinner"></div></div>

  <!-- 기대평 작성 모달 -->
  <div id="anticipation-modal-overlay" class="modal-overlay hidden" onclick="closeAnticipationModal()">
    <div class="modal anticipation-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="anticipation-modal-title">강의 기대평 작성</div>
        <button class="modal-close" onclick="closeAnticipationModal()"><i class="ti ti-x"></i></button>
      </div>
      <div style="padding: 0 22px 20px">
        <p class="anticipation-modal-note" id="anticipation-modal-note">
          이 강의에 대한 기대평을 작성해 주세요. 작성 완료 시 할인 쿠폰이 발급되며, 수강 신청은 별도로 진행합니다.
        </p>
        <textarea id="anticipation-input" maxlength="150" placeholder="이 강의에서 배우고 싶은 점, 기대하는 내용을 20~150자로 작성해주세요."></textarea>
        <div class="anticipation-modal-meta">
          <span id="anticipation-char-count">0 / 150자</span>
          <span>최소 20자</span>
        </div>
        <button class="btn-anticipation-submit" id="btn-anticipation-submit" onclick="submitAnticipationReview()">기대평 작성하고 쿠폰 받기</button>
      </div>
    </div>
  </div>

  <!-- 결제 모달 -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">수강 신청</div>
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-course-info" id="modal-course-info"></div>
      <div class="modal-section-title">결제 수단 선택</div>
      <div class="pay-options">
        <label class="pay-option"><input type="radio" name="paymethod" value="카카오페이" checked /><span class="pay-label"><i class="ti ti-brand-kakao"></i> 카카오페이</span></label>
        <label class="pay-option"><input type="radio" name="paymethod" value="네이버페이" /><span class="pay-label"><i class="ti ti-n-a"></i> 네이버페이</span></label>
        <label class="pay-option"><input type="radio" name="paymethod" value="신용카드(이니시스)" /><span class="pay-label"><i class="ti ti-credit-card"></i> 신용카드</span></label>
        <label class="pay-option"><input type="radio" name="paymethod" value="가상계좌" /><span class="pay-label"><i class="ti ti-building-bank"></i> 가상계좌</span></label>
      </div>
      <div class="modal-total" id="modal-total"></div>
      <button class="btn-pay" id="btn-pay" onclick="submitOrder()">결제하기</button>
      <p class="modal-notice">오픈 베타: 실제 PG 연동 전 · 결제 즉시 수강 등록 · 7일 이내 환불 가능</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth-redirect.js"></script>
  <script src="/js/site-layout.js"></script>
  <script src="/js/site-header.js?v=9"></script>
  <script src="/js/home-nav.js"></script>
  <script src="/js/course-enrollment-ui.js"></script>
  <script>
    const slug = new URLSearchParams(location.search).get('slug')
    let courseData = null
    let anticipationReviews = []
    const ANTICIPATION_MIN = 20
    const ANTICIPATION_MAX = 150

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function formatDate(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      if (Number.isNaN(d.getTime())) return String(iso).slice(0, 10)
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`
    }

    async function load() {
      if (!slug) { location.href = '/'; return }
      try {
        const [course, reviewsRes] = await Promise.all([
          API.get('/courses/' + slug),
          API.get('/courses/' + slug + '/anticipation-reviews').catch(() => ({ reviews: [] })),
        ])
        courseData = course
        anticipationReviews = reviewsRes.reviews || []
        render(courseData)
      } catch { document.getElementById('course-wrap').innerHTML = '<p style="text-align:center;padding:60px;color:#aaa">강의를 찾을 수 없습니다.</p>' }
    }

    function isFreeVod(c) {
      return c.course_type !== 'live' && Number(c.sale_price) === 0
    }

    function formatSalePrice(c) {
      if (c.course_type === 'live') return ''
      if (isFreeVod(c)) return 'Free / 무료'
      return `₩${Number(c.sale_price).toLocaleString()}`
    }

    function renderCurriculumSection(c) {
      if (c.course_type === 'live') {
        if (c.live_curriculum_image) {
          return `<img class="live-curriculum-image" src="${esc(c.live_curriculum_image)}" alt="강의 커리큘럼" />`
        }
        if (c.live_curriculum_text) {
          return `<div class="live-curriculum-text">${esc(c.live_curriculum_text)}</div>`
        }
        if ((c.chapters || []).length) {
          return renderChapterList(c)
        }
        return `<div class="curriculum-empty">강사가 커리큘럼을 준비 중입니다.</div>`
      }
      return renderChapterList(c)
    }

    function renderChapterList(c) {
      if (!(c.chapters || []).length) {
        return `<div class="curriculum-empty">등록된 커리큘럼이 없습니다.</div>`
      }
      return `<div class="curriculum-list">${(c.chapters||[]).map((ch,i) => `
        <div class="curriculum-item">
          <span class="ci-num">${String(i+1).padStart(2,'0')}</span>
          <span class="ci-title">${esc(ch.title)}</span>
          ${ch.is_free
            ? `<a href="/player.html?slug=${c.slug}&chapter=${ch.id}" class="ci-free" onclick="return checkLoginForFree(event,'${c.slug}','${ch.id}')">무료 보기</a>`
            : c.enrolled
              ? `<a href="/player.html?slug=${c.slug}&chapter=${ch.id}" class="ci-watch"><i class="ti ti-player-play"></i></a>`
              : `<span class="ci-lock"><i class="ti ti-lock"></i></span>`
          }
          <span class="ci-time">${esc(ch.duration||'')}</span>
        </div>`).join('')}</div>`
    }

    const ANTICIPATION_SUBMIT_CREATE = '기대평 작성하고 쿠폰 받기'
    const ANTICIPATION_SUBMIT_EDIT = '기대평 수정하기'

    function canEditAnticipation(c) {
      return c?.my_anticipation && c.my_anticipation.can_edit !== false && c.anticipation_modify?.can_modify !== false
    }

    function renderAnticipationFeed(c) {
      if (!anticipationReviews.length) {
        return `<div class="anticipation-empty">아직 작성된 기대평이 없습니다.<br>첫 번째 기대평을 남겨보세요!</div>`
      }
      const mineId = c?.my_anticipation?.id
      const lockedNote = c?.my_anticipation && !canEditAnticipation(c) && c.anticipation_modify?.message
        ? `<div class="anticipation-edit-locked">${esc(c.anticipation_modify.message)}</div>`
        : ''
      return `<div class="anticipation-feed">${anticipationReviews.map(r => {
        const isMine = mineId && r.id === mineId
        const actions = isMine && canEditAnticipation(c)
          ? `<div class="anticipation-card-actions">
              <button type="button" class="anticipation-card-edit" onclick="openAnticipationModal(true)">수정</button>
              <button type="button" class="anticipation-card-edit anticipation-card-edit--danger" onclick="deleteAnticipationReview()">삭제</button>
            </div>`
          : ''
        return `
        <article class="anticipation-card${isMine ? ' anticipation-card--mine' : ''}">
          <div class="anticipation-card-head">
            <div>
              <div class="anticipation-card-id">${esc(r.author_id_display || r.author_display)}${isMine ? ' <span class="anticipation-card-mine-label">내 기대평</span>' : ''}</div>
              <div class="anticipation-card-date">작성 ${formatDate(r.created_at)}</div>
            </div>
            ${actions}
          </div>
          <div class="anticipation-card-content">${esc(r.content)}</div>
          ${isMine ? lockedNote : ''}
        </article>`
      }).join('')}</div>`
    }

    function renderBodySection(c) {
      return `
        <div class="course-body-inner">
          <div class="course-body-main">
            <div class="course-section">
              <h2>커리큘럼</h2>
              ${renderCurriculumSection(c)}
            </div>
          </div>
          <aside class="course-body-side" aria-label="수강 기대평">
            <div class="course-section">
              <h2>수강 기대평</h2>
              ${renderAnticipationFeed(c)}
            </div>
          </aside>
        </div>`
    }

    function enrollButtonLabel(c) {
      if (c.course_type === 'live') return '무료 수강 신청'
      if (isFreeVod(c)) return '무료 수강 시작'
      return '결제하고 수강 시작'
    }

    function renderAnticipationBtn(c) {
      if (c.my_anticipation) {
        if (!canEditAnticipation(c)) return ''
        return `<button type="button" class="btn-enroll btn-enroll--secondary" onclick="openAnticipationModal(true)"><i class="ti ti-pencil"></i> 기대평 수정</button>`
      }
      return `<button type="button" class="btn-enroll btn-enroll--secondary" onclick="openAnticipationModal()"><i class="ti ti-message-heart"></i> 기대평 작성하고 쿠폰 받기</button>`
    }

    function wrapBuyActions(html) {
      const inner = String(html || '').trim()
      if (!inner) return ''
      return `<div class="buy-actions">${inner}</div>`
    }

    function renderEnrollActions(c) {
      if (c.enrolled) {
        if (c.course_type === 'live') {
          return wrapBuyActions(`${renderLiveEnrolledAction(c)}${renderAnticipationBtn(c)}`)
        }
        return wrapBuyActions(`<a href="/player.html?slug=${c.slug}&chapter=first" class="btn-enroll enrolled"><i class="ti ti-player-play"></i> 이어서 수강하기</a>${renderAnticipationBtn(c)}`)
      }
      if (c.course_type === 'live') {
        if (c.live_status === 'ended') return wrapBuyActions(`<div class="btn-enroll buy-live-ended">종료된 강의입니다</div>`)
        return wrapBuyActions(`${renderApplyBtn(c, `<i class="ti ti-user-plus"></i> ${enrollButtonLabel(c)}`, `onclick="submitCourseEnroll()"`)}
          ${renderAnticipationBtn(c)}`)
      }
      if (isFreeVod(c)) {
        return wrapBuyActions(`${renderApplyBtn(c, `<i class="ti ti-player-play"></i> ${enrollButtonLabel(c)}`, `onclick="submitCourseEnroll()"`)}
          ${renderAnticipationBtn(c)}`)
      }
      return wrapBuyActions(`${renderApplyBtn(c, `<i class="ti ti-shopping-cart"></i> ${enrollButtonLabel(c)}`, `onclick="openModal()"`)}
        ${renderAnticipationBtn(c)}`)
    }

    function renderLiveEnrolledAction(c) {
      const ended = c.live_status === 'ended' || c.live_resources?.live_ended
      const extras = c.enrolled && window.LiveSession?.liveResourceButtonsHtml
        ? LiveSession.liveResourceButtonsHtml(c, { enrolled: true })
        : ''
      if (ended) {
        return `<div class="btn-enroll enrolled buy-live-enrolled buy-live-enrolled--ended"><i class="ti ti-check"></i> 라이브 종료</div>${extras || ''}`
      }
      const url = (c.live_chat_url || '').trim()
      if (url) {
        return `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="btn-kakao-room">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M9 1C4.582 1 1 3.925 1 7.5c0 2.286 1.417 4.294 3.563 5.467L3.67 16.14a.25.25 0 0 0 .37.278L8.13 13.96c.288.027.58.04.87.04 4.418 0 8-2.925 8-6.5S13.418 1 9 1z" fill="#3A1D1D"/></svg>
          수강생 대기실로 입장
        </a>${extras || ''}`
      }
      return `<div class="btn-enroll enrolled buy-live-enrolled"><i class="ti ti-check"></i> 신청 완료</div>${extras || ''}`
    }

    function renderApplyBtn(c, labelHtml, onclickAttr) {
      return CourseEnrollmentUI.wrapBlockButton(labelHtml, c, onclickAttr)
    }

    function renderBuyEnrollmentNote(c) {
      const m = CourseEnrollmentUI.meta(c)
      if (!m.hasLimit) return ''
      const fill = CourseEnrollmentUI.gaugeFillStyle(m.ratio)
      const cap = CourseEnrollmentUI.gaugeCapacityStyle(m.ratio)
      return `<div class="buy-enroll-status">
        <span class="enroll-capacity" style="${cap}" aria-label="신청 ${m.count}명, 모집 정원 ${m.limit}명">${m.count}<span class="enroll-capacity-sep">/</span>${m.limit}</span>
        <span class="enroll-gauge" role="meter" aria-valuenow="${m.count}" aria-valuemin="0" aria-valuemax="${m.limit}">
          <span class="enroll-gauge-fill" style="${fill}"></span>
        </span>
      </div>`
    }

    function renderBuyThumb(c, thumbClass) {
      const thumbImg = c.thumbnail_url || c.thumbnail_image
      if (thumbImg) {
        return `<div class="buy-thumb ${thumbClass}"><img src="${esc(thumbImg)}" alt="" /></div>`
      }
      return `<div class="buy-thumb ${thumbClass}"><i class="ti ${c.thumbnail_icon || 'ti-video'}"></i></div>`
    }

    function buildHeroGalleryUrls(c) {
      const urls = []
      const add = (url) => {
        const s = String(url || '').trim()
        if (!s || urls.includes(s) || urls.length >= 10) return
        urls.push(s)
      }
      add(c.thumbnail_url || c.thumbnail_image)
      const gallery = Array.isArray(c.hero_gallery) ? c.hero_gallery : []
      gallery.forEach(add)
      return urls
    }

    function renderHeroBackground(urls) {
      if (!urls.length) {
        return `<div class="course-hero-bg course-hero-bg--empty" aria-hidden="true"></div><div class="course-hero-overlay" aria-hidden="true"></div>`
      }
      const slides = urls.map((url, i) => {
        const safeUrl = esc(url).replace(/'/g, '%27')
        return `<div class="course-hero-slide${i === 0 ? ' is-active' : ''}">
          <div class="course-hero-slide-blur" style="background-image:url('${safeUrl}')"></div>
          <div class="course-hero-slide-main" style="background-image:url('${safeUrl}')"></div>
        </div>`
      }).join('')
      return `<div class="course-hero-bg" aria-hidden="true"><div class="course-hero-slides">${slides}</div></div><div class="course-hero-overlay" aria-hidden="true"></div>`
    }

    let _heroGalleryTimer = null
    function startHeroGallery(heroEl) {
      if (_heroGalleryTimer) {
        clearInterval(_heroGalleryTimer)
        _heroGalleryTimer = null
      }
      if (!heroEl) return
      const slides = heroEl.querySelectorAll('.course-hero-slide')
      if (slides.length <= 1) return
      let idx = 0
      _heroGalleryTimer = setInterval(() => {
        slides[idx].classList.remove('is-active')
        idx = (idx + 1) % slides.length
        slides[idx].classList.add('is-active')
      }, 2000)
    }

    function render(c) {
      const totalChapters = c.chapters?.length || 0
      const freeChapters = c.chapters?.filter(ch=>ch.is_free).length || 0
      const thumbClass = c.thumb_style==='dark'?'thumb-dark':'thumb-light'
      const freeVod = isFreeVod(c)
      const salePriceLabel = formatSalePrice(c)
      const badgeHtml = c.course_type === 'live'
        ? googleMeetBadgeHtml('ch-badge ch-badge--meet')
        : (c.badge ? `<span class="ch-badge ch-badge--${String(c.badge).toLowerCase()}">${c.badge}</span>` : '')

      const heroGalleryUrls = buildHeroGalleryUrls(c)
      document.title = c.title + ' — 타닥클래스'
      document.getElementById('course-wrap').innerHTML = `
        <div class="course-hero course-hero--gallery">
          ${renderHeroBackground(heroGalleryUrls)}
          <div class="container course-hero-inner">
            <div class="course-hero-text">
              ${badgeHtml ? `<div class="course-hero-badges">${badgeHtml}</div>` : ''}
              <div class="course-hero-copy">
                <h1>${c.title}</h1>
                <p class="ch-desc">${c.description||''}</p>
                <div class="ch-meta">
                  <span><i class="ti ti-star-filled"></i> ${Number(c.review_count) > 0 ? `${c.rating} (${Number(c.review_count).toLocaleString()}개 후기)` : '후기 없음'}</span>
                  <span><i class="ti ti-users"></i> ${Number(c.student_count).toLocaleString()}명 수강 중</span>
                  <span><i class="ti ti-list"></i> 총 ${totalChapters}강</span>
                  <span><i class="ti ti-player-play"></i> 무료 ${freeChapters}강 제공</span>
                </div>
              </div>
            </div>
            <div class="course-buy-card${CourseEnrollmentUI.buyCardPanelClass(c)}">
              ${CourseEnrollmentUI.buyCardPanelOpen(c)}
              ${renderBuyThumb(c, thumbClass)}
              <div class="buy-body">
                ${c.course_type === 'live' ? `
                <div class="buy-intro">
                  <div class="buy-live-head">
                    <div class="buy-live-price">무료</div>
                    <div class="buy-live-sub">라이브 강의 · 무료 참여</div>
                  </div>
                  ${c.live_schedule ? `<div class="buy-live-schedule"><i class="ti ti-calendar"></i> ${c.live_schedule}</div>` : ''}
                </div>
                ${renderBuyEnrollmentNote(c)}
                ${renderEnrollActions(c)}
                <ul class="buy-features">
                  <li><span class="feat-icon feat-icon--live"><i class="ti ti-broadcast"></i></span> 라이브 실시간 강의</li>
                  <li><span class="feat-icon feat-icon--meet"><svg width="15" height="15" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.56 2.95-2.23 5.45-4.76 7.12l7.73 6c4.51-4.16 7.12-10.27 7.12-17.59z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg></span> Google Meet 참여</li>
                  ${c.enrolled ? `<li><span class="feat-icon feat-icon--replay"><i class="ti ti-player-play"></i></span> 강의 종료 후 다음 날 오후 1시 다시보기 (수강생 전용)</li>` : ''}
                  <li><span class="feat-icon feat-icon--material"><i class="ti ti-download"></i></span> 자료 다운로드 강의 당일(1일)</li>
                </ul>
              ` : `
                ${renderBuyEnrollmentNote(c)}
                <div class="buy-pricing">
                  <div class="buy-price-row">
                    ${!freeVod && c.price!==c.sale_price ? `<span class="buy-original">₩${Number(c.price).toLocaleString()}</span><span class="buy-disc">${Math.round((1-c.sale_price/c.price)*100)}%</span>` : ''}
                  </div>
                  <div class="buy-price${freeVod ? ' buy-price--free' : ''}">${salePriceLabel}</div>
                </div>
                ${renderEnrollActions(c)}
                <ul class="buy-features">
                  <li><span class="feat-icon feat-icon--lifetime"><i class="ti ti-infinity"></i></span> 평생 소장</li>
                  <li><span class="feat-icon feat-icon--mobile"><i class="ti ti-device-mobile"></i></span> 모바일 수강 가능</li>
                  <li><span class="feat-icon feat-icon--cert"><i class="ti ti-certificate"></i></span> 수료증 발급</li>
                  <li><span class="feat-icon feat-icon--refund"><i class="ti ti-rotate-clockwise"></i></span> 7일 이내 환불 보장</li>
                </ul>
              `}
              </div>
              ${CourseEnrollmentUI.buyCardPanelClose(c)}
            </div>
          </div>
        </div>

        <div class="container course-body-wrap">
          ${renderBodySection(c)}
        </div>`
      startHeroGallery(document.querySelector('.course-hero--gallery'))
    }

    function setAnticipationModalMode(edit) {
      const overlay = document.getElementById('anticipation-modal-overlay')
      overlay.dataset.mode = edit ? 'edit' : 'create'
      document.getElementById('anticipation-modal-title').textContent = edit ? '기대평 수정' : '강의 기대평 작성'
      document.getElementById('anticipation-modal-note').textContent = edit
        ? '작성하신 기대평을 수정할 수 있습니다. 쿠폰은 최초 작성 시에만 발급됩니다. 강의 시작 1시간 전까지만 수정·삭제할 수 있습니다.'
        : '이 강의에 대한 기대평을 작성해 주세요. 작성 완료 시 할인 쿠폰이 발급되며, 수강 신청은 별도로 진행합니다.'
      document.getElementById('btn-anticipation-submit').textContent = edit ? ANTICIPATION_SUBMIT_EDIT : ANTICIPATION_SUBMIT_CREATE
    }

    function openAnticipationModal(edit = false) {
      if (!API.isLoggedIn()) { location.href = loginUrl('/course.html?slug=' + slug); return }
      if (edit && !canEditAnticipation(courseData)) {
        toast(courseData?.anticipation_modify?.message || '강의 시작 1시간 전부터는 기대평을 수정·삭제할 수 없습니다.', 'error')
        return
      }
      const existing = courseData?.my_anticipation
      if (edit && !existing) {
        toast('수정할 기대평이 없습니다.', 'info')
        return
      }
      const input = document.getElementById('anticipation-input')
      input.value = edit && existing ? existing.content : ''
      setAnticipationModalMode(!!edit)
      updateAnticipationCount()
      document.getElementById('anticipation-modal-overlay').classList.remove('hidden')
      input.focus()
    }

    function closeAnticipationModal() {
      document.getElementById('anticipation-modal-overlay').classList.add('hidden')
    }

    function updateAnticipationCount() {
      const len = document.getElementById('anticipation-input').value.length
      document.getElementById('anticipation-char-count').textContent = `${len} / ${ANTICIPATION_MAX}자`
    }

    document.getElementById('anticipation-input')?.addEventListener('input', updateAnticipationCount)

    async function submitAnticipationReview() {
      const content = document.getElementById('anticipation-input').value.trim()
      if (content.length < ANTICIPATION_MIN) {
        toast(`기대평은 ${ANTICIPATION_MIN}자 이상 입력해주세요.`, 'error')
        return
      }
      if (content.length > ANTICIPATION_MAX) {
        toast(`기대평은 ${ANTICIPATION_MAX}자 이내로 입력해주세요.`, 'error')
        return
      }
      const overlay = document.getElementById('anticipation-modal-overlay')
      const isEdit = overlay.dataset.mode === 'edit'
      const btn = document.getElementById('btn-anticipation-submit')
      btn.disabled = true
      btn.textContent = '처리 중...'
      try {
        const res = isEdit
          ? await API.patch('/courses/' + slug + '/anticipation-reviews/mine', { content })
          : await API.post('/courses/' + slug + '/anticipation-reviews', { content })
        closeAnticipationModal()
        courseData.my_anticipation = res.review
        if (isEdit) {
          toast('기대평이 수정되었습니다.', 'success')
        } else {
          let msg = '기대평 작성 완료!'
          if (res.coupon?.code) {
            msg += ` ${res.coupon.discount_percent || 10}% 할인 쿠폰이 발급되었습니다.`
          }
          toast(msg, 'success')
        }
        setTimeout(() => location.reload(), 900)
      } catch (err) {
        toast(err.message, 'error')
        btn.disabled = false
        btn.textContent = isEdit ? ANTICIPATION_SUBMIT_EDIT : ANTICIPATION_SUBMIT_CREATE
      }
    }

    async function deleteAnticipationReview() {
      if (!API.isLoggedIn()) { location.href = loginUrl('/course.html?slug=' + slug); return }
      if (!canEditAnticipation(courseData)) {
        toast(courseData?.anticipation_modify?.message || '강의 시작 1시간 전부터는 기대평을 수정·삭제할 수 없습니다.', 'error')
        return
      }
      if (!confirm('기대평을 삭제할까요?\n발급된 기대평 할인 쿠폰도 회수됩니다.')) return
      try {
        await API.del('/courses/' + slug + '/anticipation-reviews/mine')
        toast('기대평이 삭제되었습니다.', 'success')
        setTimeout(() => location.reload(), 700)
      } catch (err) {
        toast(err.message, 'error')
      }
    }

    async function submitCourseEnroll() {
      if (!API.isLoggedIn()) { location.href = loginUrl('/course.html?slug=' + slug); return }
      if (CourseEnrollmentUI.isClosedForApply(courseData)) {
        toast('모집 정원이 마감되었습니다.', 'error')
        return
      }
      try {
        await API.post('/courses/' + slug + '/enroll', {})
        toast(courseData.course_type === 'live' ? '라이브 수강 신청이 완료되었습니다.' : '수강 신청이 완료되었습니다.', 'success')
        setTimeout(() => {
          if (courseData.course_type !== 'live') {
            location.href = '/player.html?slug=' + slug + '&chapter=first'
          } else {
            location.reload()
          }
        }, 900)
      } catch (err) {
        toast(err.message, 'error')
      }
    }

    let selectedCouponCode = null
    const STACKABLE_REASONS = ['anticipation_review', 'course_review_five_star']

    async function openModal() {
      if (!API.isLoggedIn()) { location.href = loginUrl('/course.html?slug=' + slug); return }
      if (CourseEnrollmentUI.isClosedForApply(courseData)) {
        toast('모집 정원이 마감되었습니다.', 'error')
        return
      }
      document.getElementById('modal-course-info').innerHTML = `<div class="mci-title">${courseData.title}</div>`
      selectedCouponCode = null
      let total = Number(courseData.sale_price)
      try {
        const [coupons, orders] = await Promise.all([
          API.get('/my/coupons'),
          API.get('/orders/my').catch(() => []),
        ])
        const isFirstPurchase = !orders.length
        const applicable = (coupons || []).filter(c => {
          if (c.status !== 'available') return false
          if (c.expires_at && new Date(c.expires_at) <= new Date()) return false
          if (c.reason === 'client_course_reward') return false
          if (c.coupon_type === 'editor_featured' || c.reason === 'editor_featured' || c.reason === 'editor_apply_featured') return false
          if (c.first_course_only && !isFirstPurchase) return false
          return true
        })
        const stackable = applicable.filter(c => STACKABLE_REASONS.includes(c.reason) && c.discount_percent)
        const anticipation = stackable.filter(c => c.reason === 'anticipation_review').slice(0, 1)
        const reviewPick = stackable
          .filter(c => c.reason === 'course_review_five_star')
          .sort((a, b) => (a.expires_at || a.created_at || '').localeCompare(b.expires_at || b.created_at || ''))
          .slice(0, 1)
        const stackCoupons = [...anticipation, ...reviewPick]
        let totalDiscount = 0
        for (const c of stackCoupons) {
          totalDiscount += Math.floor(total * Number(c.discount_percent) / 100)
        }
        if (totalDiscount <= 0) {
          for (const c of applicable) {
            const d = c.discount_percent
              ? Math.floor(total * Number(c.discount_percent) / 100)
              : Number(c.amount || 0)
            if (d > totalDiscount) {
              totalDiscount = d
              selectedCouponCode = c.code
            }
          }
        }
        if (totalDiscount > 0) total = Math.max(0, total - totalDiscount)
      } catch (_) {}
      document.getElementById('modal-total').innerHTML = `총 결제금액 <b>₩${total.toLocaleString()}</b>`
      document.getElementById('modal-overlay').classList.remove('hidden')
    }
    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden') }

    async function submitOrder() {
      const method = document.querySelector('input[name=paymethod]:checked').value
      const btn = document.getElementById('btn-pay')
      btn.disabled = true; btn.textContent = '처리 중...'
      try {
        const payload = { course_id: courseData.id, method }
        if (selectedCouponCode) payload.coupon_code = selectedCouponCode
        const res = await API.post('/orders', payload)
        let msg = '수강 신청이 완료되었습니다! 🎉'
        if (res.reward_coupon) {
          msg += ` 의뢰인 혜택: 1만원 할인쿠폰 ${res.reward_coupon.count}장(총 ${res.reward_coupon.total_amount.toLocaleString()}원)이 발급되었습니다.`
        }
        toast(msg, 'success')
        closeModal()
        setTimeout(() => location.href = '/player.html?slug=' + slug + '&chapter=first', 1200)
      } catch(err) {
        toast(err.message, 'error')
        btn.disabled = false; btn.textContent = '결제하기'
      }
    }

    function checkLoginForFree(e, s, chId) {
      if (!API.isLoggedIn()) {
        e.preventDefault()
        location.href = loginUrl('/player.html?slug=' + s + '&chapter=' + chId)
        return false
      }
      return true
    }

    load()
  </script>
</body>
