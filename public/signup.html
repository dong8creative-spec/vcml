<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — 타닥클래스</title>
  <script>
    // 회원가입/로그인은 단일 인증 페이지(login.html)로 통합되었습니다.
    (function () {
      var params = new URLSearchParams(location.search);
      if (!params.has('mode')) params.set('mode', 'signup');
      var qs = params.toString();
      location.replace('/login.html' + (qs ? '?' + qs : ''));
    })();
  </script>
</head>
<body>
  <noscript><meta http-equiv="refresh" content="0; url=/login.html" /></noscript>
</body>
</html>
