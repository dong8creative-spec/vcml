<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-13X3J2EYQ2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-13X3J2EYQ2');
  </script>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1:1 문의 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=16" />
  <link rel="stylesheet" href="/css/legal.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />
</head>
<body class="legal-page" data-legal-page="inquiry">

<div data-site-header></div>

<main class="legal-main">
  <header class="legal-hero">
    <p class="legal-hero-eyebrow">Contact</p>
    <h1 class="legal-hero-title">1:1 문의</h1>
    <p class="legal-hero-meta">운영 시간: 평일 10:00~18:00 (주말·공휴일 제외)</p>
    <p class="legal-hero-lead">영업일 기준 1~2일 내 이메일로 답변드립니다.</p>
  </header>

  <div class="support-hero-grid">
    <div class="support-tile">
      <div class="support-tile-icon">✉️</div>
      <p class="support-tile-label">Email</p>
      <p class="support-tile-value"><a href="mailto:dong8creative@gmail.com">dong8creative@gmail.com</a></p>
      <p class="support-tile-desc">24시간 접수 · 영업일 기준 1~2일 내 답변</p>
    </div>
    <div class="support-tile">
      <div class="support-tile-icon">📞</div>
      <p class="support-tile-label">Phone</p>
      <p class="support-tile-value"><a href="tel:01048506946">010-4850-6946</a></p>
      <p class="support-tile-desc">평일 10:00~18:00 (주말·공휴일 제외)</p>
    </div>
  </div>

  <div class="legal-single-wrap">
    <article class="legal-article legal-article--flat">
      <form id="ticket-form" class="inquiry-form">
        <div class="inquiry-form-row">
          <div class="inquiry-field">
            <label for="tf-name">이름 *</label>
            <input id="tf-name" type="text" placeholder="홍길동" required />
          </div>
          <div class="inquiry-field">
            <label for="tf-email">이메일 *</label>
            <input id="tf-email" type="email" placeholder="example@email.com" required />
          </div>
        </div>
        <div class="inquiry-field">
          <label for="tf-type">문의 유형</label>
          <select id="tf-type">
            <option value="general">일반</option>
            <option value="payment">결제·환불</option>
            <option value="course">강의 관련</option>
            <option value="account">계정</option>
            <option value="editor">에디터즈</option>
            <option value="etc">기타</option>
          </select>
        </div>
        <div class="inquiry-field">
          <label for="tf-subject">제목 *</label>
          <input id="tf-subject" type="text" placeholder="문의 제목을 입력해주세요" required />
        </div>
        <div class="inquiry-field">
          <label for="tf-content">내용 *</label>
          <textarea id="tf-content" rows="6" placeholder="문의 내용을 상세히 입력해주세요..." required></textarea>
        </div>
        <div class="inquiry-form-actions">
          <button type="submit" id="tf-submit" class="inquiry-submit">문의 제출</button>
          <p id="tf-msg" class="inquiry-msg" hidden></p>
        </div>
      </form>

      <div class="support-page-cta support-page-cta--subtle">
        <p>먼저 FAQ에서 답변을 찾아보세요.</p>
        <a href="/faq.html" class="support-page-cta-btn support-page-cta-btn--ghost"><i class="ti ti-help"></i> 자주 묻는 질문</a>
      </div>
    </article>
  </div>
</main>

<div data-chrome="footer"></div>
<script src="/js/api.js?v=3"></script>
<script src="/js/site-layout.js"></script>
<script src="/js/site-header.js?v=12"></script>
<script src="/js/site-chrome.js"></script>
<script src="/js/legal-page.js"></script>
<script>
document.getElementById('ticket-form').addEventListener('submit', async e => {
  e.preventDefault()
  const btn = document.getElementById('tf-submit')
  const msg = document.getElementById('tf-msg')
  btn.disabled = true
  btn.textContent = '제출 중...'
  msg.hidden = true
  try {
    const user = API.user()
    if (user) {
      const nameEl = document.getElementById('tf-name')
      const emailEl = document.getElementById('tf-email')
      if (!nameEl.value) nameEl.value = user.name || ''
      if (!emailEl.value) emailEl.value = user.email || ''
    }
    await API.post('/support/tickets', {
      name: document.getElementById('tf-name').value,
      email: document.getElementById('tf-email').value,
      type: document.getElementById('tf-type').value,
      subject: document.getElementById('tf-subject').value,
      content: document.getElementById('tf-content').value,
      user_id: user?.id || null,
    })
    msg.hidden = false
    msg.className = 'inquiry-msg inquiry-msg--success'
    msg.textContent = '문의가 접수되었습니다. 영업일 기준 1~2일 내 답변드립니다.'
    e.target.reset()
  } catch (err) {
    msg.hidden = false
    msg.className = 'inquiry-msg inquiry-msg--error'
    msg.textContent = err.message || '제출 중 오류가 발생했습니다.'
  } finally {
    btn.disabled = false
    btn.textContent = '문의 제출'
  }
})

;(async () => {
  const user = API.user()
  if (!user) return
  const nameEl = document.getElementById('tf-name')
  const emailEl = document.getElementById('tf-email')
  if (user.name) nameEl.value = user.name
  if (user.email) emailEl.value = user.email
})()
</script>
</body>
</html>
