<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열람실 — 타닥클래스</title>
  <meta name="description" content="타닥클래스 기관 대상 강의 자료. 발급된 접근 코드를 입력하면 강의 슬라이드를 열람할 수 있습니다." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div data-site-header></div>

  <main style="max-width:1100px;margin:0 auto;padding:48px 20px 80px">

    <!-- 타이틀 -->
    <div style="margin-bottom:36px">
      <h1 style="font-size:28px;font-weight:800;color:var(--text-primary);margin:0 0 8px">열람실</h1>
      <p style="font-size:15px;color:var(--text-secondary);margin:0">발급된 접근 코드를 입력하면 강의 자료를 열람할 수 있습니다.</p>
    </div>

    <!-- 비로그인 안내 -->
    <div id="inst-login-notice" style="display:none;background:#f8f9ff;border:1px solid #e0e7ff;border-radius:12px;padding:28px;text-align:center;margin-bottom:32px">
      <p style="font-size:16px;color:#3730a3;font-weight:600;margin:0 0 12px">로그인 후 이용할 수 있습니다</p>
      <p style="font-size:14px;color:#666;margin:0 0 20px">열람실 자료는 회원 로그인 후 접근 코드 입력을 통해 열람할 수 있습니다.</p>
      <a href="/login.html?next=%2Finstitution.html" class="btn-primary" style="display:inline-block;padding:12px 28px;background:var(--primary);color:#fff;border-radius:8px;font-weight:600;text-decoration:none;font-size:15px">로그인 / 회원가입</a>
    </div>

    <!-- 코드 입력 박스 -->
    <div id="inst-code-box" style="display:none;background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:32px">
      <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:14px"><i class="ti ti-key" style="margin-right:6px"></i>접근 코드 입력</div>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="text" id="inst-code-input" placeholder="접근 코드를 입력하세요 (예: SCHOOL2024)"
          style="flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;text-transform:uppercase;outline:none;letter-spacing:1px"
          onkeydown="if(event.key==='Enter')redeemCode()">
        <button onclick="redeemCode()" class="btn-primary"
          style="padding:11px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap">
          확인
        </button>
      </div>
      <p id="inst-redeem-status" style="font-size:13px;margin:10px 0 0;color:#e74c3c"></p>
    </div>

    <!-- 내 강의 목록 -->
    <div id="inst-my-courses" style="display:none">
      <div style="font-size:17px;font-weight:700;color:var(--text-primary);margin-bottom:16px">내 강의 목록</div>
      <div id="inst-course-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px">
        <div style="text-align:center;padding:40px;color:#aaa;font-size:14px">불러오는 중...</div>
      </div>
    </div>

  </main>

  <!-- 후기 작성 모달 -->
  <div id="review-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:16px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto">
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:6px">자료 열람 전 후기 작성</div>
      <p style="font-size:14px;color:#888;margin:0 0 20px;line-height:1.6">이 강의 자료에 대한 후기를 <strong style="color:#111">130자 이상</strong> 작성하면 슬라이드를 열람할 수 있습니다.</p>

      <textarea id="review-textarea" rows="6" placeholder="강의 자료에 대한 솔직한 후기를 남겨주세요. (최소 130자)"
        oninput="updateReviewCount()"
        style="width:100%;padding:12px 14px;border:1px solid #e0e0e0;border-radius:10px;font-size:14px;line-height:1.7;resize:vertical;box-sizing:border-box;outline:none;font-family:inherit"></textarea>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
        <span id="review-char-count" style="font-size:13px;color:#aaa">0 / 130자</span>
        <div style="display:flex;gap:10px">
          <button onclick="closeReviewModal()" style="padding:10px 20px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:14px;cursor:pointer">취소</button>
          <button id="review-submit-btn" onclick="submitReview()"
            style="padding:10px 24px;border:none;border-radius:8px;background:#d1d5db;color:#fff;font-size:14px;font-weight:600;cursor:not-allowed" disabled>
            후기 제출 후 열람
          </button>
        </div>
      </div>
      <p id="review-modal-status" style="font-size:13px;color:#e74c3c;margin:10px 0 0;text-align:center"></p>
    </div>
  </div>

  <!-- 슬라이드 뷰어 오버레이 -->
  <div id="slide-viewer" style="display:none;position:fixed;inset:0;background:#111;z-index:2000;flex-direction:column">

    <!-- 상단 바 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#1a1a1a;flex-shrink:0">
      <div id="slide-title" style="font-size:15px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1"></div>
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
        <span id="slide-counter" style="font-size:13px;color:#aaa"></span>
        <button onclick="closeViewer()" style="background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;line-height:1"><i class="ti ti-x"></i></button>
      </div>
    </div>

    <!-- 슬라이드 영역 -->
    <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden" id="slide-stage">

      <!-- 워터마크 오버레이 (opacity 0.03 = 3%) -->
      <div id="slide-watermark" style="position:absolute;inset:0;pointer-events:none;z-index:10;display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none">
        <!-- JS로 사용자 정보 채움 -->
      </div>

      <!-- 이미지 -->
      <img id="slide-img" src="" alt="" draggable="false"
        style="max-width:100%;max-height:100%;object-fit:contain;display:block;-webkit-user-drag:none;pointer-events:none"
        oncontextmenu="return false">

      <!-- 이전 / 다음 버튼 -->
      <button id="slide-prev" onclick="slideMove(-1)"
        style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
        <i class="ti ti-chevron-left"></i>
      </button>
      <button id="slide-next" onclick="slideMove(1)"
        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
        <i class="ti ti-chevron-right"></i>
      </button>
    </div>

    <!-- 하단 썸네일 갤러리 -->
    <div id="slide-thumbnails"
      style="display:flex;gap:8px;padding:10px 16px;background:#1a1a1a;overflow-x:auto;flex-shrink:0;scrollbar-width:thin;scrollbar-color:#444 #1a1a1a">
    </div>
  </div>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />
  <script src="/js/api.js?v=3"></script>
  <script src="/js/site-layout.js"></script>
  <script src="/js/site-header.js?v=11"></script>
  <script>
  let _slides = []
  let _slideIdx = 0
  let _watermarkText = ''

  async function boot() {
    await waitForApi()
    if (!API.isLoggedIn()) {
      document.getElementById('inst-login-notice').style.display = 'block'
      return
    }
    const u = API.user()
    _watermarkText = (u?.name || '') + (u?.email ? '  ' + u.email : '')
    document.getElementById('inst-code-box').style.display = 'block'
    document.getElementById('inst-my-courses').style.display = 'block'
    loadMyCourses()
  }

  function waitForApi() {
    return new Promise(resolve => {
      if (typeof API !== 'undefined' && API.isLoggedIn !== undefined) return resolve()
      document.addEventListener('site-header-ready', resolve, { once: true })
      setTimeout(resolve, 2000)
    })
  }

  async function loadMyCourses() {
    const grid = document.getElementById('inst-course-grid')
    try {
      const courses = await API.get('/institution/my-courses')
      if (!courses.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:#aaa;font-size:14px">아직 열람 가능한 강의가 없습니다.<br>접근 코드를 입력하면 강의를 추가할 수 있습니다.</div>'
        return
      }
      grid.innerHTML = courses.map(c => `
        <div data-course-id="${esc(c.id)}" data-course-title="${esc(c.title)}" onclick="openCourse(this.dataset.courseId,this.dataset.courseTitle)" style="background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 20px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='none'">
          ${c.cover_image
            ? `<img src="${esc(c.cover_image)}" alt="${esc(c.title)}" style="width:100%;aspect-ratio:16/9;object-fit:cover" draggable="false" oncontextmenu="return false">`
            : `<div style="width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center"><i class="ti ti-presentation" style="font-size:40px;color:rgba(255,255,255,0.6)"></i></div>`}
          <div style="padding:16px">
            <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:6px;line-height:1.4">${esc(c.title)}</div>
            ${c.description ? `<p style="font-size:13px;color:#888;margin:0 0 10px;line-height:1.5">${esc(c.description.slice(0,80))}</p>` : ''}
            <div style="font-size:12px;color:#aaa"><i class="ti ti-layout-grid"></i> 슬라이드 ${c.slide_count || 0}장</div>
          </div>
        </div>
      `).join('')
    } catch (e) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#e74c3c;font-size:14px">오류: ${e.message}</div>`
    }
  }

  async function redeemCode() {
    const code = document.getElementById('inst-code-input').value.trim().toUpperCase()
    const statusEl = document.getElementById('inst-redeem-status')
    if (!code) { statusEl.style.color='#e74c3c'; statusEl.textContent = '코드를 입력하세요.'; return }
    statusEl.style.color = '#888'
    statusEl.textContent = '확인 중...'
    try {
      const res = await API.post('/institution/redeem', { code })
      statusEl.style.color = '#22c55e'
      statusEl.textContent = `"${res.course_title}" 강의가 추가됐습니다!`
      document.getElementById('inst-code-input').value = ''
      loadMyCourses()
    } catch (e) {
      statusEl.style.color = '#e74c3c'
      statusEl.textContent = e.message || '올바르지 않은 코드입니다.'
    }
  }

  let _pendingCourseId = null
  let _pendingCourseTitle = ''

  function openReviewModal(courseId, courseTitle) {
    _pendingCourseId = courseId
    _pendingCourseTitle = courseTitle || ''
    const ta = document.getElementById('review-textarea')
    ta.value = ''
    ta.placeholder = courseTitle
      ? `"${courseTitle}"에 대한 솔직한 후기를 남겨주세요. (최소 130자)`
      : '강의 자료에 대한 솔직한 후기를 남겨주세요. (최소 130자)'
    document.getElementById('review-char-count').textContent = '0'
    document.getElementById('review-submit-btn').disabled = true
    document.getElementById('review-modal').style.display = 'flex'
    ta.focus()
  }

  function closeReviewModal() {
    document.getElementById('review-modal').style.display = 'none'
    _pendingCourseId = null
  }

  function updateReviewCount() {
    const val = document.getElementById('review-textarea').value
    const trimLen = val.trim().length
    document.getElementById('review-char-count').textContent = trimLen
    document.getElementById('review-submit-btn').disabled = trimLen < 130
  }

  async function submitReview() {
    const content = document.getElementById('review-textarea').value.trim()
    if (content.length < 130) return
    const btn = document.getElementById('review-submit-btn')
    btn.disabled = true
    btn.textContent = '제출 중...'
    try {
      await API.post('/institution/courses/' + _pendingCourseId + '/review', { content })
      closeReviewModal()
      openCourse(_pendingCourseId, _pendingCourseTitle)
    } catch (e) {
      alert('오류: ' + e.message)
      btn.disabled = false
      btn.textContent = '후기 제출 후 열람'
    }
  }

  async function openCourse(courseId, courseTitle) {
    try {
      const data = await API.get('/institution/courses/' + courseId + '/slides')
      if (!data.slides || !data.slides.length) { alert('슬라이드가 없습니다.'); return }
      _slides = data.slides
      _slideIdx = 0
      renderWatermark()
      renderThumbnails()
      showSlide(0)
      document.getElementById('slide-title').textContent = data.title || ''
      document.getElementById('slide-viewer').style.display = 'flex'
      document.addEventListener('keydown', onKeyDown)
    } catch (e) {
      if (e.message === 'REVIEW_REQUIRED') {
        openReviewModal(courseId, courseTitle || '')
      } else {
        alert('오류: ' + e.message)
      }
    }
  }

  function renderWatermark() {
    const wm = document.getElementById('slide-watermark')
    const text = _watermarkText || '타닥클래스'
    const repeated = Array(40).fill(text).join('   ')
    let rows = ''
    for (let i = 0; i < 12; i++) {
      rows += `<div style="white-space:nowrap;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;padding:24px 0;transform:rotate(-30deg);opacity:0.03">${repeated}</div>`
    }
    wm.innerHTML = `<div style="position:absolute;inset:-200px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden">${rows}</div>`
  }

  function renderThumbnails() {
    const bar = document.getElementById('slide-thumbnails')
    bar.innerHTML = _slides.map((url, i) => `
      <img src="${esc(url)}" alt="슬라이드 ${i+1}" onclick="showSlide(${i})"
        id="thumb-${i}"
        style="height:60px;aspect-ratio:16/9;object-fit:cover;border-radius:4px;cursor:pointer;flex-shrink:0;border:2px solid transparent;opacity:0.6;transition:opacity .15s"
        draggable="false" oncontextmenu="return false">
    `).join('')
  }

  function showSlide(idx) {
    if (idx < 0 || idx >= _slides.length) return
    const prev = _slideIdx
    _slideIdx = idx
    document.getElementById('slide-img').src = _slides[idx]
    document.getElementById('slide-counter').textContent = `${idx + 1} / ${_slides.length}`
    document.getElementById('slide-prev').style.opacity = idx === 0 ? '0.3' : '1'
    document.getElementById('slide-next').style.opacity = idx === _slides.length - 1 ? '0.3' : '1'

    const prevThumb = document.getElementById(`thumb-${prev}`)
    if (prevThumb) { prevThumb.style.borderColor = 'transparent'; prevThumb.style.opacity = '0.6' }
    const curThumb = document.getElementById(`thumb-${idx}`)
    if (curThumb) { curThumb.style.borderColor = '#fff'; curThumb.style.opacity = '1'; curThumb.scrollIntoView({ inline: 'nearest', behavior: 'smooth' }) }
  }

  function slideMove(dir) {
    showSlide(_slideIdx + dir)
  }

  function closeViewer() {
    document.getElementById('slide-viewer').style.display = 'none'
    document.removeEventListener('keydown', onKeyDown)
    document.getElementById('slide-img').src = ''
    _slides = []
  }

  function onKeyDown(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') slideMove(1)
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') slideMove(-1)
    else if (e.key === 'Escape') closeViewer()
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  document.addEventListener('site-header-ready', boot)
  window.addEventListener('load', () => { if (typeof API !== 'undefined') boot() })
  </script>
</body>
</html>
