<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-13X3J2EYQ2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-13X3J2EYQ2');

  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수강 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=14" /><link rel="stylesheet" href="/css/common.css" /><link rel="stylesheet" href="/css/player.css?v=2" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />
</head>
<body>
  <div data-site-header></div>
  <header class="player-nav">
    <div class="player-course-title" id="player-course-title"></div>
    <a href="/mypage.html" class="player-nav-link"><i class="ti ti-layout-dashboard"></i> 내 강의</a>
  </header>

  <div class="player-layout">
    <!-- 영상/콘텐츠 영역 -->
    <main class="player-main" id="player-main">
      <div class="spinner"></div>
    </main>

    <!-- 모바일 커리큘럼 토글 버튼 -->
    <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" onclick="toggleSidebar()" aria-expanded="false" aria-controls="player-sidebar">
      <span><i class="ti ti-list"></i> 강의 목록</span>
      <i class="ti ti-chevron-down"></i>
    </button>

    <!-- 사이드 커리큘럼 -->
    <aside class="player-sidebar" id="player-sidebar">
      <div class="sidebar-course-title" id="sidebar-title">커리큘럼</div>
      <div class="chapter-list" id="chapter-list"></div>
    </aside>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/site-layout.js"></script>
  <script src="/js/site-header.js?v=10"></script>
  <script src="/js/auth-redirect.js"></script>
  <script>
    if (!requireLogin()) { /* 리다이렉트 중 */ }

    const params = new URLSearchParams(location.search)
    const slug = params.get('slug')
    if (!slug) { location.href = '/'; }
    const chapterParam = params.get('chapter')
    let courseData = null
    let currentChapterId = null

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function toEmbedUrl(url) {
      if (!url) return null
      try {
        const u = new URL(url)
        if (u.hostname === 'youtu.be') {
          const id = u.pathname.replace(/^\//, '').split('/')[0]
          return id ? `https://www.youtube.com/embed/${id}` : null
        }
        if (u.hostname.includes('youtube.com')) {
          const v = u.searchParams.get('v')
          if (v) return `https://www.youtube.com/embed/${v}`
          const m = u.pathname.match(/\/(embed|shorts|live)\/([^/?]+)/)
          if (m) return `https://www.youtube.com/embed/${m[2]}`
        }
        if (u.hostname.includes('vimeo.com')) {
          const parts = u.pathname.split('/').filter(Boolean)
          const id = parts[parts.length - 1]
          return id ? `https://player.vimeo.com/video/${id}` : null
        }
      } catch (_) {}
      return null
    }

    function showLiveOnlyNotice() {
      document.getElementById('player-main').innerHTML = `
        <div class="player-beta-notice player-live-notice">
          <i class="ti ti-broadcast"></i>
          <h2>라이브 강의입니다</h2>
          <p>이 강의는 Google Meet 라이브로 진행됩니다.<br>일정·입장 링크는 <strong>마이페이지 &gt; 내 강의</strong>에서 확인하세요.</p>
          ${courseData.live_schedule ? `<p class="player-live-schedule"><i class="ti ti-calendar"></i> ${esc(courseData.live_schedule)}</p>` : ''}
          <a href="/mypage.html" class="player-live-btn">내 강의에서 Meet 입장하기</a>
          <a href="/course.html?slug=${encodeURIComponent(slug)}" class="player-live-link">강의 상세로 돌아가기</a>
        </div>`
      document.getElementById('sidebar-title').textContent = '라이브 안내'
      document.getElementById('chapter-list').innerHTML = `<div class="chapter-item active"><span class="ch-num">01</span><span class="ch-title">라이브 세션</span></div>`
    }

    function startChapterPlayer() {
      document.getElementById('player-course-title').textContent = courseData.title
      document.getElementById('sidebar-title').textContent = courseData.title
      renderChapterList(courseData.chapters)

      const chapters = courseData.chapters || []
      const firstId = chapterParam === 'first' || !chapterParam
        ? chapters[0]?.id
        : chapterParam
      if (firstId) loadChapter(firstId)
      else document.getElementById('player-main').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>재생할 챕터가 없습니다.</p></div>`
    }

    async function load() {
      try {
        courseData = await API.get('/courses/' + slug)
        document.getElementById('player-course-title').textContent = courseData.title

        const chapters = courseData.chapters || []
        if ((courseData.course_type === 'live' || courseData.delivery_mode === 'live_first' || courseData.live_starts_at) && !chapters.length) {
          showLiveOnlyNotice()
          return
        }

        startChapterPlayer()
      } catch(e) {
        document.getElementById('player-main').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>${esc(e.message)}</p></div>`
      }
    }

    function renderChapterList(chapters) {
      document.getElementById('chapter-list').innerHTML = chapters.map((ch, i) => `
        <div class="chapter-item ${ch.id==currentChapterId?'active':''}" id="ch-item-${esc(ch.id)}" onclick="loadChapter('${esc(ch.id)}')">
          <span class="ch-num">${String(i+1).padStart(2,'0')}</span>
          <span class="ch-title">${esc(ch.title)}</span>
          <span class="ch-dur">${esc(ch.duration||'')}</span>
        </div>`).join('')
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('player-sidebar')
      const btn = document.getElementById('sidebar-toggle-btn')
      const isOpen = sidebar.classList.toggle('is-open')
      btn.classList.toggle('is-open', isOpen)
      btn.setAttribute('aria-expanded', isOpen)
    }

    let _progressTimer = null

    function scheduleProgressMark(chId) {
      if (_progressTimer) clearTimeout(_progressTimer)
      // 3초 후 수강 시작 기록 — 환불정책 "1초 이상 재생 시 수강으로 간주" 근거
      _progressTimer = setTimeout(async () => {
        try {
          await API.post('/my/progress', { chapter_id: chId, completed: false, watched_sec: 1 })
          const updated = await API.get('/courses/' + slug)
          courseData.chapters = updated.chapters
          renderChapterList(updated.chapters)
        } catch (_) {}
      }, 3000)
    }

    async function loadChapter(id) {
      currentChapterId = id
      if (_progressTimer) { clearTimeout(_progressTimer); _progressTimer = null }
      document.querySelectorAll('.chapter-item').forEach(el => el.classList.toggle('active', el.id === 'ch-item-'+id))
      if (window.innerWidth <= 768) {
        const sidebar = document.getElementById('player-sidebar')
        const btn = document.getElementById('sidebar-toggle-btn')
        sidebar.classList.remove('is-open')
        btn.classList.remove('is-open')
        btn.setAttribute('aria-expanded', 'false')
      }

      document.getElementById('player-main').innerHTML = '<div class="spinner"></div>'
      try {
        const ch = await API.get(`/courses/${slug}/chapters/${id}`)
        renderPlayer(ch)
        history.replaceState(null,'',`?slug=${slug}&chapter=${id}`)
        // 영상이 있는 챕터만 수강 기록 — 미완료 상태일 때만
        if (ch.video_url && !ch.progress?.completed) scheduleProgressMark(id)
      } catch(e) {
        document.getElementById('player-main').innerHTML = `<div class="empty-state"><i class="ti ti-lock"></i><p>${e.message}</p><a href="/course.html?slug=${slug}" class="btn-back">강의 페이지로 →</a></div>`
      }
    }

    function renderPlayer(ch) {
      const isCompleted = ch.progress?.completed === 1
      const embed = toEmbedUrl(ch.video_url)
      const videoHtml = embed
        ? `<iframe class="video-embed" src="${esc(embed)}" title="${esc(ch.title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`
        : ch.video_url
          ? `<div class="video-external">
              <p class="video-external-note">등록된 영상 링크에서 재생됩니다.</p>
              <a href="${esc(ch.video_url)}" target="_blank" rel="noopener noreferrer" class="vp-play-btn"><i class="ti ti-external-link"></i> 영상 페이지에서 보기</a>
            </div>`
          : `<div class="video-placeholder">
              <div class="vp-icon"><i class="ti ti-player-play"></i></div>
              <div class="vp-title">${esc(ch.title)}</div>
              <div class="vp-note">영상 파일 업로드 후 이 영역에서 자동 재생됩니다.<br>현재는 수강 완료 처리만 가능합니다.</div>
              <button class="vp-play-btn" onclick="simulateWatch('${esc(ch.id)}', ${ch.next_id ? `'${esc(ch.next_id)}'` : 'null'})">
                <i class="ti ti-player-play"></i> 수강 완료 처리하기
              </button>
            </div>`

      document.getElementById('player-main').innerHTML = `
        ${!ch.video_url ? `<div class="player-beta-banner">
          <i class="ti ti-info-circle"></i>
          <span>오픈 베타: 영상 업로드 전 시뮬레이션 모드입니다. 실제 영상은 정식 오픈 후 연결됩니다.</span>
        </div>` : ''}
        <div class="video-area">${videoHtml}</div>
        <div class="chapter-info">
          <div class="ci-header">
            <h2>${esc(ch.title)}</h2>
            <span class="ci-dur"><i class="ti ti-clock"></i> ${esc(ch.duration||'-')}</span>
          </div>
          <div class="ci-nav">
            ${ch.prev_id ? `<button onclick="loadChapter('${esc(ch.prev_id)}')" class="ci-btn"><i class="ti ti-arrow-left"></i> 이전 강의</button>` : '<span></span>'}
            <span class="ci-status ${isCompleted?'done':''}">
              ${isCompleted ? '<i class="ti ti-circle-check"></i> 수강 완료' : '<i class="ti ti-circle-dashed"></i> 미완료'}
            </span>
            ${ch.next_id ? `<button onclick="loadChapter('${esc(ch.next_id)}')" class="ci-btn next"><i class="ti ti-arrow-right"></i> 다음 강의</button>` : ''}
          </div>
        </div>`
    }

    async function simulateWatch(chId, nextId) {
      try {
        await API.post('/my/progress', { chapter_id: chId, completed: true, watched_sec: 600 })

        // 사이드 챕터 목록 새로 로드
        const updated = await API.get('/courses/' + slug)
        renderChapterList(updated.chapters)

        toast('수강 완료! 🎉', 'success')
        if (nextId) setTimeout(() => loadChapter(nextId), 1000)
        else toast('강의를 모두 완료했습니다! 수료증을 확인하세요.', 'success')
      } catch(e) { toast(e.message, 'error') }
    }

    load()
  </script>
</body>
</html>
