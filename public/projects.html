<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-13X3J2EYQ2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-13X3J2EYQ2');
  </script>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클라이언츠 — 타닥클래스</title>
  <link rel="stylesheet" href="/css/style.css?v=14" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />
  <style>
    .proj-hero { background:linear-gradient(135deg,#111827,#1e2d4a); padding:52px 24px; text-align:center; color:#fff; }
    .proj-hero h1 { font-size: 36px; font-weight:900; margin-bottom:10px; }
    .proj-hero p { font-size: 18px; color:rgba(255,255,255,.65); margin-bottom:24px; line-height:1.7; }
    .hero-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .btn-post { background:#111111; color:#fff; padding:12px 28px; border-radius:10px; font-size: 18px; font-weight:700; transition:.15s; }
    .btn-post:hover { background:#4a55e0; }
    .btn-editor { border:2px solid rgba(255,255,255,.3); color:#fff; padding:12px 24px; border-radius:10px; font-size: 18px; font-weight:600; transition:.15s; }
    .btn-editor:hover { background:rgba(255,255,255,.1); }

    .proj-body { max-width:1100px; margin:0 auto; padding:40px 24px; }

    .filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; align-items:center; }
    .filter-chip { padding:7px 16px; border-radius:20px; border:1.5px solid #eee; background:#fff; font-size: 15.6px; font-weight:600; color:#555; cursor:pointer; transition:.15s; }
    .filter-chip.active { background:#111111; color:#fff; border-color:#111111; }
    .proj-count { font-size: 16.8px; color:#888; margin-left:auto; }

    .proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; }
    .proj-card { background:#fff; border:1px solid #eee; border-radius:14px; padding:24px; transition:.2s; cursor:pointer; }
    .proj-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.1); transform:translateY(-2px); }
    .pc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .pc-cat { font-size: 14.4px; font-weight:700; color:#111111; background:#f5f5f5; padding:3px 10px; border-radius:12px; }
    .pc-status { font-size: 14.4px; font-weight:700; padding:3px 10px; border-radius:12px; }
    .pc-status.open { background:#f0fff4; color:#333333; }
    .pc-status.matched { background:#fff8e8; color:#d4991a; }
    .pc-status.completed { background:#f0f0f0; color:#888; }
    .pc-title { font-size: 19.2px; font-weight:800; color:#1a1a1a; margin-bottom:8px; line-height:1.4; }
    .pc-desc { font-size: 15.6px; color:#666; line-height:1.6; margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .pc-meta { display:flex; gap:16px; font-size: 14.4px; color:#888; flex-wrap:wrap; }
    .pc-meta span { display:flex; align-items:center; gap:4px; }
    .pc-bottom { border-top:1px solid #f0f0f0; margin-top:14px; padding-top:14px; display:flex; justify-content:space-between; align-items:center; }
    .pc-budget { font-size: 18px; font-weight:800; color:#1a1a1a; }
    .pc-quotes { font-size: 14.4px; color:#111111; font-weight:600; }

    .empty-msg { text-align:center; padding:60px 0; color:#aaa; font-size: 18px; }
    .spinner { width:32px; height:32px; border:3px solid #eee; border-top-color:#111111; border-radius:50%; animation:spin .7s linear infinite; margin:48px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div data-site-header></div>

<div class="proj-hero">
  <h1>🎬 클라이언츠</h1>
  <p>타닥클래스 에디터즈에게 영상 제작을 맡겨보세요.<br>검증된 실력의 에디터가 빠르게 견적을 제출합니다.</p>
  <div class="hero-btns">
    <a href="/project-post.html" class="btn-post">+ 클라이언츠 등록하기</a>
    <a href="/editors.html" class="btn-editor">에디터즈 보기</a>
  </div>
</div>

<div class="proj-body">
  <div class="filter-row">
    <button class="filter-chip active" data-cat="전체">전체</button>
    <button class="filter-chip" data-cat="유튜브 쇼츠">유튜브 쇼츠</button>
    <button class="filter-chip" data-cat="인스타그램 릴스">인스타그램 릴스</button>
    <button class="filter-chip" data-cat="틱톡">틱톡</button>
    <button class="filter-chip" data-cat="AI영상">AI영상</button>
    <button class="filter-chip" data-cat="색보정">색보정</button>
    <button class="filter-chip" data-cat="세로 브랜드필름">세로 브랜드필름</button>
    <span class="proj-count" id="proj-count"></span>
  </div>
  <div class="proj-grid" id="proj-grid"><div class="spinner"></div></div>
</div>

<script src="/js/api.js?v=3"></script>
<script src="/js/site-layout.js"></script>
<script src="/js/site-header.js?v=10"></script>
<script>
let allProjects = []
const statusLabel = { open:'모집중', matched:'매칭완료', in_progress:'진행중', completed:'완료', cancelled:'취소' }

function fmt(n) { return n ? '₩' + Number(n).toLocaleString() : '-' }

function renderProjects(list) {
  const grid = document.getElementById('proj-grid')
  document.getElementById('proj-count').textContent = `총 ${list.length}건`
  if (!list.length) { grid.innerHTML = '<div class="empty-msg">등록된 클라이언츠가 없습니다.</div>'; return }
  grid.innerHTML = list.map(p => `
    <div class="proj-card" onclick="location.href='/project-detail.html?id=${p.id}'">
      <div class="pc-top">
        <span class="pc-cat">${p.category}</span>
        <span class="pc-status ${p.status}">${statusLabel[p.status]||p.status}</span>
      </div>
      <div class="pc-title">${p.title}</div>
      <div class="pc-desc">${p.description}</div>
      <div class="pc-meta">
        <span><i class="ti ti-user"></i> ${p.client_name}</span>
        ${p.deadline ? `<span><i class="ti ti-calendar"></i> ${p.deadline}</span>` : ''}
        <span><i class="ti ti-clock"></i> ${(p.created_at||'').slice(0,10)}</span>
      </div>
      <div class="pc-bottom">
        <span class="pc-budget">${p.budget_min||p.budget_max ? fmt(p.budget_min)+(p.budget_max?` ~ ${fmt(p.budget_max)}`:'') : '예산 협의'}</span>
        <span class="pc-quotes"><i class="ti ti-file-text"></i> 견적 ${p.quote_count||0}건</span>
      </div>
    </div>`).join('')
}

async function load() {
  try {
    allProjects = await API.get('/projects')
    renderProjects(allProjects)
  } catch(e) {
    document.getElementById('proj-grid').innerHTML = '<div class="empty-msg">클라이언츠 목록을 불러올 수 없습니다.</div>'
  }
}

document.querySelector('.filter-row').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip')
  if (!chip) return
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'))
  chip.classList.add('active')
  const cat = chip.dataset.cat
  renderProjects(cat === '전체' ? allProjects : allProjects.filter(p => p.category === cat))
})

const user = API.user ? API.user() : null
const canPostProject = user && (user.member_type === 'client' || user.role === 'admin')
if (user && !canPostProject) {
  const postBtn = document.querySelector('.btn-post')
  if (postBtn) postBtn.style.display = 'none'
}

load()
</script>
</body>
</html>
